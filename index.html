  {
    id: 'what-is-a-derivative',
    title: 'What a derivative actually is',
    dek: 'Before any limits, before any rules: a derivative is just how fast something is changing right now.',
    readMins: 10,
    blocks: [
      { type: 'p', text: 'Glance at your car\'s speedometer. It reads $60$ mph. But you have not driven for an hour — maybe you have been driving for ten seconds. So what does "$60$ miles per hour" even mean at this exact instant? Answer that honestly and you have already understood the derivative. The notation comes later; the idea is sitting on your dashboard.' },
      { type: 'callout', label: 'INTUITION', text: 'A derivative is an instantaneous rate of change. It answers: at this precise moment, how fast is the output changing as the input nudges forward? It is the steepness of a curve at a single point.' },
      { type: 'h2', text: 'Rate of change, before anything fancy' },
      { type: 'p', text: 'Suppose you drive $120$ miles in $2$ hours. Your **average** speed is the change in distance divided by the change in time:' },
      { type: 'math', tex: '\\text{average speed} = \\frac{\\Delta \\text{distance}}{\\Delta \\text{time}} = \\frac{120 \\text{ mi}}{2 \\text{ h}} = 60 \\text{ mph}' },
      { type: 'p', text: 'But that $60$ is smeared across the whole trip. You sped up, you slowed down, you stopped for coffee. The average hides all of it. The derivative is what you get when you stop averaging over a big chunk and instead ask about an instant.' },
      { type: 'h2', text: 'The slope of a curve is the rate of change' },
      { type: 'p', text: 'Plot distance against time. A **straight line** has a constant slope — rise over run — and that slope *is* the speed. Steeper line, faster travel. Flat line, parked. For a straight line the slope is the same everywhere, so the rate of change never varies.' },
      { type: 'p', text: 'Real motion curves. On a bending graph, the slope changes from point to point. The derivative at a point is simply **the slope of the curve right there** — the steepness of the line that just kisses the curve at that one spot. Mathematicians call that the tangent line.' },
      { type: 'callout', label: 'THE PICTURE', text: 'Zoom in on any smooth curve far enough and it looks straight. The derivative is the slope of that "looks-straight" piece. Curvature disappears under enough magnification — and what is left is a single slope.' },
      { type: 'h2', text: 'Sneaking up on the instant' },
      { type: 'p', text: 'Here is the trick that bridges average and instant — and you can feel it without a single limit symbol. To estimate how fast something changes *at* a moment $t$, measure the average change over a tiny window around $t$, then make the window smaller, and smaller, and smaller.' },
      { type: 'p', text: 'Take $f(x)=x^2$ and ask for its rate of change at $x=3$. Average over shrinking windows:' },
      { type: 'ul', items: [
        'From $3$ to $4$: $\\dfrac{f(4)-f(3)}{4-3}=\\dfrac{16-9}{1}=7$.',
        'From $3$ to $3.1$: $\\dfrac{f(3.1)-f(3)}{0.1}=\\dfrac{9.61-9}{0.1}=6.1$.',
        'From $3$ to $3.01$: $\\dfrac{f(3.01)-f(3)}{0.01}=\\dfrac{9.0601-9}{0.01}=6.01$.'
      ] },
      { type: 'p', text: 'The numbers march toward $6$. Not by magic: the squaring machine\'s slope at $x=3$ really is $6$. (The rule, which you will derive later, is that $x^2$ has slope $2x$ — and $2\\times 3 = 6$.) That "what it is heading toward" is the limit, and the derivative is the value the shrinking-window slopes close in on.' },
      { type: 'callout', variant: 'warn', label: 'WATCH OUT', text: 'You cannot just plug in a window of size zero — that gives $\\frac{0}{0}$, which is meaningless. The whole point of the limit is to find what the ratio approaches as the window shrinks, without ever actually dividing by zero.' },
      { type: 'h2', text: 'The notation, demystified' },
      { type: 'p', text: 'Once the idea is solid, the symbols are friendly. We write the derivative of $f$ as $f\'(x)$ or $\\frac{dy}{dx}$. That fraction is not a real division — it is the ghost of "rise over run" after the run has shrunk toward zero. Read $\\frac{dy}{dx}$ as "the rate at which $y$ changes per tiny change in $x$."' },
      { type: 'math', tex: 'f\'(x) = \\lim_{h \\to 0} \\frac{f(x+h) - f(x)}{h}' },
      { type: 'p', text: 'Stare at that and you will recognize old friends: $f(x+h)-f(x)$ is the rise, $h$ is the run, and $\\lim_{h\\to 0}$ is "let the window shrink." It is the average-rate formula with the averaging window squeezed to an instant.' },
      { type: 'video', title: 'The Essence of Calculus, Chapter 1', channel: '3Blue1Brown', duration: '17:04', url: 'https://www.youtube.com/watch?v=WUvTyaaNkzM' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'How to teach the derivative — and what counts as a rigorous foundation for it — is genuinely contested, both in classrooms and historically.' },
      { type: 'ul', items: [
        '**Intuition-first advocates** like Kalid Azad (BetterExplained) and Grant Sanderson (3Blue1Brown) argue you should *feel* the idea — slope, rate, "nudge the input" — long before meeting the formal $\\epsilon$–$\\delta$ limit, because the limit is the answer to a question students cannot appreciate until they have asked it themselves.',
        '**Rigor-first instructors** counter that "infinitely small nudges" is exactly the loose talk that took mathematics two centuries to make precise. The formal limit was invented (by Cauchy and Weierstrass) to fix real logical holes, and skipping it, they argue, breeds misconceptions that bite later.'
      ] },
      { type: 'p', text: 'There is even a respectable third path: **non-standard analysis** (Abraham Robinson, 1960s) rigorously rehabilitated the "infinitesimal" — the genuinely tiny quantity — so that Newton and Leibniz\'s original intuition can be made fully logical. So the debate is not "intuition vs. rigor" as enemies; it is *which* rigor, and *when*.' },
      { type: 'pull', text: 'A derivative is the steepness of a curve at a single point — the speedometer reading of any changing quantity.' },
      { type: 'p', text: 'When you finally compute derivatives with rules, do not lose the dashboard. Every $f\'(x)$ is answering the same human question your speedometer answers a thousand times a drive: how fast, right now? Understand that once, and the rules become shortcuts instead of spells.' }
    ],
    sources: [
      { label: 'Kalid Azad, BetterExplained — A Gentle Introduction to Learning Calculus', url: 'https://betterexplained.com/articles/a-gentle-introduction-to-learning-calculus/' },
      { label: '3Blue1Brown — Essence of Calculus (Grant Sanderson)', url: 'https://www.youtube.com/watch?v=WUvTyaaNkzM' },
      { label: 'Khan Academy — Derivatives introduction', url: 'https://www.khanacademy.org/math/calculus-1/cs1-derivatives-definition-and-basic-rules' }
    ]
  },
  {
    id: 'why-proof-matters',
    title: 'Why proof matters',
    dek: 'Proof is not bureaucracy. It is the difference between believing something and knowing it for certain — forever.',
    readMins: 9,
    blocks: [
      { type: 'p', text: 'Check it for the first hundred numbers and a pattern looks like a law. But "it worked every time I tried" is exactly how people got fooled for centuries. A proof is the only tool that lets you say "this is true for **all** numbers" — including the infinitely many you will never test. That certainty, not the ritual, is the point.' },
      { type: 'callout', label: 'INTUITION', text: 'A proof is an unbroken chain of "if this, then that" reasoning, starting from things we already agree are true, ending at the claim. If every link holds, the conclusion is forced — there is no wiggle room left for doubt.' },
      { type: 'h2', text: 'The vocabulary that trips everyone up' },
      { type: 'p', text: 'Three phrases do most of the heavy lifting in proofs. Learn to read them like a native and half the fog lifts.' },
      { type: 'ul', items: [
        '**"If $P$, then $Q$"** ($P \\Rightarrow Q$): whenever $P$ holds, $Q$ must follow. It does **not** claim $P$ is true, and it says nothing about what happens when $P$ is false.',
        '**"$P$ if and only if $Q$"** ($P \\Leftrightarrow Q$): the two statements rise and fall together — $P \\Rightarrow Q$ **and** $Q \\Rightarrow P$. Proving an "iff" means proving the arrow in *both* directions.',
        '**The converse** of "if $P$ then $Q$" is "if $Q$ then $P$" — a genuinely different claim. "If it rains, the ground is wet" is true; its converse "if the ground is wet, it rained" is not (someone ran a sprinkler).'
      ] },
      { type: 'callout', variant: 'warn', label: 'WATCH OUT', text: 'Confusing a statement with its converse is the single most common reasoning error. $P \\Rightarrow Q$ does not give you $Q \\Rightarrow P$ for free. You have to earn the second arrow separately.' },
      { type: 'h2', text: 'Proof by contradiction: assume the opposite and watch it break' },
      { type: 'p', text: 'One of the oldest and sharpest moves: to prove a claim, assume it is **false** and show that assumption leads somewhere impossible. If "false" forces an absurdity, then "false" cannot stand — so the claim is true. Here is the ancient gem: $\\sqrt{2}$ is irrational (it cannot be written as a fraction).' },
      { type: 'ol', items: [
        'Suppose, for contradiction, that $\\sqrt{2}=\\frac{a}{b}$ where $a$ and $b$ are whole numbers sharing **no common factor** (the fraction is fully reduced).',
        'Square both sides: $2 = \\frac{a^2}{b^2}$, so $a^2 = 2b^2$. That makes $a^2$ even, which forces $a$ itself to be even (an odd number squared is odd).',
        'If $a$ is even, write $a = 2k$. Then $a^2 = 4k^2$, so $4k^2 = 2b^2$, giving $b^2 = 2k^2$ — meaning $b^2$ is even, so $b$ is even too.',
        'But now both $a$ and $b$ are even — they share the factor $2$. That contradicts step 1, where we said the fraction was fully reduced. The contradiction means our starting assumption was impossible.'
      ] },
      { type: 'theorem', label: 'CONCLUSION', text: 'Since assuming $\\sqrt{2}$ is a fraction leads to a contradiction, $\\sqrt{2}$ cannot be a fraction. It is irrational. Notice we never tested a single decimal — we proved it for the actual number, exactly.' },
      { type: 'h2', text: 'Proof by induction: knock over the first domino' },
      { type: 'p', text: 'When a claim is about every positive whole number, induction is your engine. Show two things: (1) the claim holds for the first case, and (2) **if** it holds for some number $n$, **then** it holds for $n+1$. Together these topple every domino in the infinite line. Let us prove the classic:' },
      { type: 'math', tex: '1 + 2 + 3 + \\cdots + n = \\frac{n(n+1)}{2}' },
      { type: 'ol', items: [
        '**Base case** ($n=1$): the left side is just $1$; the right side is $\\frac{1(1+1)}{2}=\\frac{2}{2}=1$. They match. First domino falls.',
        '**Inductive step:** assume it works for $n$, i.e. $1+2+\\cdots+n=\\frac{n(n+1)}{2}$. Now add the next term, $n+1$, to both sides.',
        'Left side becomes $\\frac{n(n+1)}{2}+(n+1)$. Factor out $(n+1)$: $(n+1)\\left(\\frac{n}{2}+1\\right)=(n+1)\\cdot\\frac{n+2}{2}=\\frac{(n+1)(n+2)}{2}$.',
        'That is exactly the formula with $n$ replaced by $n+1$ — namely $\\frac{(n+1)((n+1)+1)}{2}$. So truth at $n$ guarantees truth at $n+1$.'
      ] },
      { type: 'p', text: 'First domino falls (base case), and each domino knocks the next (inductive step), so **all** of them fall. The formula holds for every positive integer — proven, not merely observed. (Sanity check: $1+2+3+4=10$, and $\\frac{4\\times 5}{2}=10$. It checks.)' },
      { type: 'callout', label: 'WHY BOTHER', text: 'Carl Friedrich Gauss reportedly summed $1$ to $100$ in seconds as a schoolboy using this very idea: pair $1+100$, $2+99$, $\\ldots$ — fifty pairs of $101$, giving $5050$. The formula agrees: $\\frac{100\\times 101}{2}=5050$.' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'How much proof belongs in school mathematics — and whether everyone needs it — is a long-running fight.' },
      { type: 'ul', items: [
        '**Proof-for-all advocates** argue that reasoning *is* mathematics; a student who only computes is a calculator with anxiety. They want proof woven in early (geometry has historically been the proving ground) so students learn to justify, not just answer.',
        '**Applications-first pragmatists** counter that formal two-column proofs alienate many learners and rarely match how working scientists, engineers, or even research mathematicians actually argue. They favor informal justification, explanation, and "convince a skeptic" over rigid templates.'
      ] },
      { type: 'p', text: 'Deeper still, mathematicians debate what a proof even *is*: a fully formal, machine-checkable derivation, or a persuasive social argument that experts accept? Computer-assisted proofs (like the four-color theorem) and the rise of formal-verification systems have only sharpened the question. The disagreement is healthy — it is mathematics arguing about its own standard of truth.' },
      { type: 'pull', text: 'Testing a thousand cases gives you confidence. A proof gives you certainty about the infinitely many cases you will never test.' },
      { type: 'p', text: 'You do not need to become a proof machine. But you should taste, at least once, the click of an airtight argument — the moment "I think this is true" becomes "this *must* be true, and here is exactly why." That click is the whole reason math is the one subject where the answers are permanent.' }
    ],
    sources: [
      { label: 'G. Pólya, How to Solve It', url: 'https://en.wikipedia.org/wiki/How_to_Solve_It' },
      { label: 'Art of Problem Solving — Proof by induction', url: 'https://artofproblemsolving.com/wiki/index.php/Induction' },
      { label: 'Wikipedia — Square root of 2 (irrationality proof)', url: 'https://en.wikipedia.org/wiki/Square_root_of_2' }
    ]
  },
  {
    id: 'estimation-skill',
    title: 'Estimation: the most useful skill nobody teaches',
    dek: 'The ability to get an answer roughly right in your head, in seconds, is worth more than most of the algebra you were drilled on.',
    readMins: 9,
    blocks: [
      { type: 'p', text: 'A waiter hands you a bill for $\\$240$ and you want to leave a $20\\%$ tip. You do not reach for a calculator — $10\\%$ of $240$ is $24$, so $20\\%$ is about $48$. Done, in your head, in two seconds. That move — getting close fast — is **estimation**, and it is quietly one of the most valuable mathematical skills you can own. Almost nobody is taught it on purpose.' },
      { type: 'callout', label: 'INTUITION', text: 'Estimation trades a little accuracy for a huge amount of speed and a powerful sanity check. You are not trying to be exact — you are trying to land in the right ballpark and catch any answer that is wildly wrong.' },
      { type: 'h2', text: 'Order of magnitude: how many zeros?' },
      { type: 'p', text: 'The single most useful estimation habit is thinking in **orders of magnitude** — powers of ten. Forget the leading digits for a moment and ask: is this answer in the tens, the thousands, the millions? A factor-of-2 error rarely hurts; a factor-of-1000 error is a disaster. Most real-world blunders are zero-counting blunders.' },
      { type: 'ul', items: [
        'A human is about $10^0$ meters tall (a couple of meters) — order of magnitude $1$.',
        'A car costs roughly $10^4$ dollars — order of magnitude tens of thousands.',
        'There are about $10^9$ people in a large country, $10^{10}$ on Earth (about $8\\times 10^9$).'
      ] },
      { type: 'p', text: 'When you multiply or divide estimates, just add or subtract the powers of ten and keep one significant digit. $3{,}000 \\times 20{,}000$ is roughly $3\\times 10^3 \\times 2\\times 10^4 = 6\\times 10^7 = 60$ million. You did not need the exact product to know the scale.' },
      { type: 'h2', text: 'The Fermi estimate: build a big number from small guesses' },
      { type: 'p', text: 'Physicist Enrico Fermi was famous for cracking impossible-looking questions with nothing but reasoning and rough guesses. The trick: break one hard, unknowable number into a chain of smaller numbers you *can* guess, then multiply them. Individual guesses are wrong — but the errors tend to cancel, and the product lands shockingly close. The legendary example: **how many piano tuners are there in Chicago?**' },
      { type: 'ol', items: [
        '**Population of Chicago:** about $3{,}000{,}000$ people.',
        '**People per household:** about $3$, so roughly $3{,}000{,}000 \\div 3 = 1{,}000{,}000$ households.',
        '**Fraction of households with a piano:** maybe $1$ in $20$. That gives $1{,}000{,}000 \\div 20 = 50{,}000$ pianos.',
        '**Tunings per piano per year:** say once a year — so $50{,}000$ tunings needed annually.',
        '**Pianos one tuner handles per year:** about $4$ a day $\\times$ $5$ days $\\times$ $50$ weeks $= 1{,}000$ pianos per tuner per year.',
        '**Divide:** $50{,}000 \\text{ tunings} \\div 1{,}000 \\text{ per tuner} = 50$ piano tuners.'
      ] },
      { type: 'math', tex: '\\frac{3{,}000{,}000}{3} \\times \\frac{1}{20} \\times 1 \\;\\div\\; (4\\times 5\\times 50) \\;=\\; \\frac{50{,}000}{1{,}000} \\;=\\; 50' },
      { type: 'callout', label: 'THE PUNCHLINE', text: 'Our estimate: about $50$ piano tuners in Chicago. Real-world counts have historically landed in the dozens — the same order of magnitude. We never looked anything up, yet we got the scale right by chaining honest guesses.' },
      { type: 'p', text: 'Why does this work? Each guess might be off by a factor of $2$ or so, some too high, some too low. Multiplied together, the over- and under-estimates tend to partially cancel, so the final number is far more reliable than any single link in the chain. That is the quiet genius of the method.' },
      { type: 'h2', text: 'Sanity-checking: estimation as an error alarm' },
      { type: 'p', text: 'Even when you do compute exactly, estimate **first**. If you expect "about $50$" and your calculator says $4{,}812$, you do not need to know the right answer to know something is broken — you fat-fingered a key or misplaced a decimal. Estimation is the smoke detector of arithmetic.' },
      { type: 'callout', variant: 'warn', label: 'WATCH OUT', text: 'The most dangerous calculator errors are the believable ones. A decimal-point slip turns $4.8$ into $48$ — both look plausible on the screen. Only a prior estimate catches it. Always know roughly what to expect before you trust the digits.' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'How much classroom time should go to estimation versus exact computation is a real and unsettled tension in math education.' },
      { type: 'ul', items: [
        '**Number-sense advocates** (a view associated with Jo Boaler and reform-minded curricula) argue that estimation and "is this answer reasonable?" thinking are *more* useful for most adults than perfect long-division by hand, and that they build genuine numerical intuition rather than brittle procedures.',
        '**Procedural-fluency defenders** counter that you cannot estimate well without a solid grip on exact arithmetic and place value first — that rough reasoning built on shaky foundations just produces confident nonsense, and that fluency must come before flexibility.'
      ] },
      { type: 'p', text: 'A related flashpoint: calculators. Critics fear they let students skip the very mental arithmetic that makes estimation possible; defenders say they free students to focus on reasoning and modeling. Both sides actually want the same end — people who *know when an answer smells wrong* — and disagree mainly about the road there.' },
      { type: 'pull', text: 'Being roughly right in seconds beats being precisely wrong after five minutes of confident button-pressing.' },
      { type: 'p', text: 'Practice this deliberately. Before any calculation, mutter a guess. After any calculation, ask "does that feel right?" Within weeks you will catch errors automatically and impress people by "doing math in your head." You are not doing magic — you are just refusing to be precisely wrong.' }
    ],
    sources: [
      { label: 'Wikipedia — Fermi problem', url: 'https://en.wikipedia.org/wiki/Fermi_problem' },
      { label: 'Jo Boaler, Mathematical Mindsets', url: 'https://www.youcubed.org/resource/mathematical-mindsets/' },
      { label: 'Kalid Azad, BetterExplained — Developing intuition for math', url: 'https://betterexplained.com/articles/developing-your-intuition-for-math/' }
    ]
  },
  {
    id: 'how-to-study-math',
    title: 'How to study math (and beat math anxiety)',
    dek: 'Most people study math in exactly the way the science says does not work. Here is what actually builds durable skill.',
    readMins: 11,
    blocks: [
      { type: 'p', text: 'Rereading the textbook and highlighting feels like studying. It is one of the least effective things you can do — it builds *familiarity*, which your brain mistakes for *mastery*. Cognitive science has spent decades figuring out what actually makes learning stick, and almost none of it is what schools accidentally train you to do. The good news: the real methods are simple, and they work for everyone.' },
      { type: 'callout', label: 'INTUITION', text: 'Learning is not pouring information in. It is forcing your brain to pull information out. The harder (within reason) the retrieval, the stronger the memory you build. Comfort is the enemy of durable learning.' },
      { type: 'h2', text: 'Retrieval: testing yourself IS studying' },
      { type: 'p', text: 'The headline finding of *Make It Stick* (Brown, Roediger, McDaniel) is that **retrieval practice** — trying to recall or re-derive something from a blank page — beats rereading dramatically. Close the book and solve the problem cold. Struggling to retrieve, even when you partly fail, cements the knowledge far better than smoothly rereading the worked solution.' },
      { type: 'ul', items: [
        'Do problems with the solutions covered. Only peek after a real attempt.',
        'After reading a section, shut the book and write down everything you remember, then check.',
        'Re-derive a formula from scratch instead of looking it up. The struggle is the point.'
      ] },
      { type: 'h2', text: 'Spacing and interleaving: the schedule matters' },
      { type: 'p', text: '**Spacing** means spreading study over days instead of cramming it into one block. Cramming feels efficient and produces fast forgetting; spaced sessions, with time to partially forget in between, force the brain to rebuild the memory stronger each time. Three half-hour sessions across a week beat one marathon the night before — same total time, far better retention.' },
      { type: 'p', text: '**Interleaving** means mixing problem types instead of doing twenty of the same kind in a row. Twenty identical problems lets you switch off your brain after problem three. Mixed problems force you to first decide *which method applies* — which is the actual skill tested on exams and needed in life.' },
      { type: 'callout', variant: 'warn', label: 'WATCH OUT', text: 'Interleaving and spacing feel worse while you do them — more errors, more effort, slower progress. That discomfort is exactly why they work. Brown and colleagues call these "desirable difficulties." If studying feels too easy, you are probably not learning much.' },
      { type: 'h2', text: 'Productive struggle and mistakes as data' },
      { type: 'p', text: 'Wrestling with a problem before being shown the method — **productive struggle** — primes your brain to absorb the solution when it arrives. And a wrong answer is not a verdict on you; it is **information** about exactly where your understanding breaks. Jo Boaler\'s research even points to the striking finding that the brain shows measurable growth in response to making and correcting mistakes.' },
      { type: 'callout', label: 'REFRAME', text: 'Getting it wrong is the work, not the failure. Every mistake is a free, precise diagnostic telling you what to fix next. Hunt your errors down — they are the fastest map to improvement.' },
      { type: 'h2', text: 'Mindset: "I cannot do math" is a sentence, not a fact' },
      { type: 'p', text: 'Carol Dweck\'s research on **growth mindset** found that believing ability can grow with effort changes how people respond to difficulty: they persist where "fixed-mindset" learners quit. The phrase to delete from your vocabulary is "I am just not a math person." Replace it with "I cannot do this **yet**." Skill in math is built, not born.' },
      { type: 'p', text: 'This connects to K. Anders Ericsson\'s work on **deliberate practice**: expertise comes not from raw talent or sheer hours, but from focused, effortful practice aimed squarely at the edge of your ability, with feedback. Practice your *weak* spots, not your comfortable ones. The piano piece you can already play teaches you nothing.' },
      { type: 'h2', text: 'A study session that actually works' },
      { type: 'ol', items: [
        'Attempt new problems **before** reading the worked examples — let yourself struggle for a few real minutes.',
        'Read the section actively: pause, look away, and recall each idea before moving on.',
        'Do mixed problems (interleave topics) with solutions covered; attempt fully before checking.',
        'Treat every wrong answer as a clue — write down *why* it went wrong, not just the right answer.',
        'Come back tomorrow and the day after (space it) and redo a few from memory. Repeat until reflex.'
      ] },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'The sharpest live debate in math education is over **timed tests and math anxiety** — and reasonable, well-credentialed people land on opposite sides.' },
      { type: 'ul', items: [
        '**The Boaler camp** argues that timed tests (timed multiplication drills especially) are a leading cause of early math anxiety — that the pressure floods working memory, blocks the very recall being tested, and teaches kids that math is about speed rather than understanding. They push for untimed, conceptual assessment.',
        '**Fluency-and-automaticity defenders** counter that fast, automatic recall of basic facts genuinely frees up working memory for harder thinking, that some timed practice builds that automaticity, and that avoiding all time pressure leaves students unprepared for real exams and real deadlines.'
      ] },
      { type: 'p', text: 'A parallel argument runs over **memorization vs. understanding** itself. The honest synthesis — and this app\'s stance — is that it is not either/or: you understand an idea once so you never have to memorize it, *then* you practice it until it is automatic. Conceptual understanding and fluent recall are partners, not rivals. The disagreement is mostly about sequence and emphasis, not about whether both matter.' },
      { type: 'pull', text: 'You are not bad at math. You have just been studying in a way that builds the feeling of learning instead of the fact of it.' },
      { type: 'p', text: 'Start small. Swap one rereading session for one closed-book problem set. Space your practice across days instead of cramming. Treat your mistakes as the curriculum. Do that consistently and the subject that felt like a wall becomes a set of ideas you can rebuild from scratch — which is what it was all along.' }
    ],
    sources: [
      { label: 'Brown, Roediger & McDaniel — Make It Stick', url: 'https://www.hup.harvard.edu/books/9780674729018' },
      { label: 'Jo Boaler — Mathematical Mindsets / youcubed', url: 'https://www.youcubed.org/resource/mathematical-mindsets/' },
      { label: 'Carol Dweck — Mindset: The New Psychology of Success', url: 'https://en.wikipedia.org/wiki/Carol_Dweck' },
      { label: 'K. Anders Ericsson — Peak: Secrets from the New Science of Expertise', url: 'https://en.wikipedia.org/wiki/Deliberate_practice' }
    ]
  }
];

<script>/* strategies.js */
window.AXIOM_STRATEGIES = [
  {
    id: 'polya-four-steps',
    title: 'Pólya’s four steps',
    dek: 'Understand, plan, execute, look back — the oldest reliable algorithm for problems you have never seen before.',
    readMins: 8,
    blocks: [
      { type: 'p', text: 'In 1945 the mathematician George Pólya wrote a thin book called **How to Solve It**. It is still the best thing ever written about doing math, because it is not about any one topic — it is about what to do when you have **no idea** what to do. His answer was four steps, in order, every time.' },
      { type: 'ol', items: [ '**Understand the problem.** What are you given? What are you asked? Can you restate it in your own words?', '**Devise a plan.** Find the connection between the data and the unknown. Have you seen a similar problem?', '**Carry out the plan.** Execute each step, checking that each one is correct as you go.', '**Look back.** Check the result. Can you see it at a glance? Can you use the method elsewhere?' ] },
      { type: 'callout', label: 'INTUITION', text: 'Most people fail at step 1, blame step 3, and skip step 4. The middle two get all the attention, but the bookends are where problems are won or lost.' },
      { type: 'h2', text: 'One problem, four steps' },
      { type: 'p', text: 'Here is a real problem. **A rectangular garden has a perimeter of 36 meters. Its length is twice its width. What is its area?** **Understand:** we are given a perimeter and that the length is twice the width, and we want the area. **Plan:** name the width $w$, so the length is $2w$; the perimeter of a rectangle is $2(\\text{length} + \\text{width})$, so write that equation, solve for $w$, then multiply to get area. The plan exists before any number is crunched.' },
      { type: 'math', tex: '2(2w + w) = 36' },
      { type: 'p', text: '**Execute.** Simplify the inside: $2w + w = 3w$, so $2(3w) = 6w = 36$, which gives $w = 6$. Then the length is $2w = 12$. Area is length times width: $12 \\times 6 = 72$. So the area is $72$ square meters.' },
      { type: 'p', text: '**Look back.** Sanity-check it. Width $6$, length $12$: perimeter is $2(12 + 6) = 2(18) = 36$. Correct. The length really is twice the width, and the answer is in square meters — right for area. Everything closes. Skipping this step is the single most expensive habit in math; the check above took ten seconds. And notice the **method** — name one unknown, express the rest in terms of it — will solve a hundred problems that look nothing like this one.' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'Pólya’s steps are nearly universally admired — but there is a real argument about what they can actually teach.' },
      { type: 'ul', items: [ 'One camp (much of the **heuristics** tradition that grew out of Pólya, and educators like Alan Schoenfeld) says these strategies are genuinely teachable: name them, model them aloud, and students get measurably better at unfamiliar problems.', 'A skeptical camp argues the four steps are **descriptive, not prescriptive** — they describe what an expert already does, but telling a novice to "devise a plan" is like telling them to "be talented." On this view, real problem-solving power comes from deep domain knowledge and lots of worked examples, not from a generic checklist.', 'A middle position, supported by Schoenfeld’s own research, is that the steps help **only when paired with self-monitoring** — the habit of asking "is this working?" mid-solution. The framework is scaffolding for that metacognition, not a magic recipe.' ] },
      { type: 'pull', text: 'The four steps don’t solve the problem for you. They stop you from quitting before you’ve understood what the problem even is.' }
    ],
    sources: [
      { label: 'G. Pólya, How to Solve It (Princeton University Press)', url: 'https://press.princeton.edu/books/paperback/9780691164076/how-to-solve-it' },
      { label: 'Alan Schoenfeld, Mathematical Problem Solving', url: 'https://www.sciencedirect.com/book/9780126288704/mathematical-problem-solving' },
      { label: 'How to Solve It — Wikipedia', url: 'https://en.wikipedia.org/wiki/How_to_Solve_It' }
    ]
  },
  {
    id: 'when-stuck',
    title: 'When you’re stuck',
    dek: 'Five concrete moves to make when you have read the problem three times and still have nothing.',
    readMins: 8,
    blocks: [
      { type: 'p', text: 'Being stuck is not a sign you are bad at math. It is the **normal state** of doing math. The difference between people who solve hard problems and people who don’t is that the solvers have a menu of moves to try when the front door is locked. Here are five that almost always crack something open.' },
      { type: 'h2', text: 'Five moves to try' },
      { type: 'ul', items: [ '**Work backwards.** Start from what you want and ask what would produce it. "I doubled a number, added 4, and got 20." Run it in reverse: undo the $+4$ to get $20 - 4 = 16$, then undo the doubling to get $16 \\div 2 = 8$. Check forward: $8 \\times 2 + 4 = 20$. When the forward path is tangled, the backward path is often straight.', '**Try small cases.** If the number is big, shrink it. "What is $1 + 2 + \\cdots + 100$?" Try $n = 1,2,3,4$: the sums are $1, 3, 6, 10$. Notice $1 = \\frac{1\\cdot 2}{2}$, $3 = \\frac{2\\cdot 3}{2}$, $6 = \\frac{3\\cdot 4}{2}$ — the pattern is $\\frac{n(n+1)}{2}$, so the answer is $\\frac{100 \\cdot 101}{2} = 5050$.', '**Draw a picture.** A diagram offloads the problem onto paper. "Two trains leave stations 300 km apart, closing at 60 and 40 km/h. When do they meet?" Sketch it and it is obvious the gap closes at $60 + 40 = 100$ km/h, so they meet after $300 \\div 100 = 3$ hours.', '**Find a pattern.** Compute a few terms. Powers of $2$ end in $2, 4, 8, 6, 2, 4, 8, 6, \\ldots$ — a cycle of length $4$. For the last digit of $2^{10}$: since $10 = 4\\cdot 2 + 2$, it lands on the 2nd entry, $4$. (Check: $2^{10} = 1024$.)', '**Solve a simpler problem.** Strip the hard part, solve what remains, add it back. Stuck on $\\frac{3}{4} + \\frac{2}{5}$? Remind yourself with $\\frac{1}{4} + \\frac{1}{4} = \\frac{2}{4}$ that the rule is "same denominator, add the tops." Then rebuild: common denominator $20$ gives $\\frac{15}{20} + \\frac{8}{20} = \\frac{23}{20}$.' ] },
      { type: 'callout', label: 'TRY THIS', text: 'Stuck right now? Pick the move that fits least — if you’ve been staring at a big number, try small cases; if it’s abstract, draw it. The point is to change your relationship to the problem, not to find the "correct" tactic.' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'Everyone agrees these tactics work for experts. The fight is over how to **get** them into a beginner’s hands.' },
      { type: 'ul', items: [ 'The **discovery / inquiry** camp says students should wrestle with rich problems and uncover these strategies themselves, because struggle is what makes the learning stick (Jo Boaler and much of the reform-math tradition lean this way).', 'The **direct-instruction** camp (and cognitive-load researchers like John Sweller) counters that novices flounder when left to discover, and learn faster from explicit worked examples that show the tactic in action, fading the support over time.', 'The honest synthesis: novices need worked examples first to build a base, but **productive struggle on the right-sized problem** is where fluency is forged. Too easy teaches nothing; too hard just frustrates. The skill is calibrating the difficulty.' ] },
      { type: 'pull', text: 'A stuck mathematician isn’t failing. They’re exactly where the interesting part begins.' }
    ],
    sources: [
      { label: 'G. Pólya, How to Solve It (Princeton University Press)', url: 'https://press.princeton.edu/books/paperback/9780691164076/how-to-solve-it' },
      { label: 'Jo Boaler, Mathematical Mindsets', url: 'https://www.youcubed.org/resource/mathematical-mindsets/' },
      { label: 'Sweller, Cognitive Load Theory (worked-example effect)', url: 'https://en.wikipedia.org/wiki/Cognitive_load' }
    ]
  },
  {
    id: 'reading-math-textbook',
    title: 'How to read a math textbook',
    dek: 'Math is the one subject you cannot read like a novel. Slow down, grab a pen, and re-derive everything.',
    readMins: 7,
    blocks: [
      { type: 'p', text: 'You can read a history chapter in an armchair with a cup of coffee. Try that with a math chapter and you will reach the end having absorbed **nothing**. Math prose is dense — a single sentence can carry a definition the next ten pages depend on, and every "clearly," "it follows that," and "we obtain" hides two or three steps the author left for you. Reading math is not reading. It is **rebuilding**, line by line, with a pen.' },
      { type: 'h2', text: 'Read with a pen, and re-derive everything' },
      { type: 'p', text: 'Never read a math example by watching the author do it. The instant you hit a worked example, **cover the solution** and try it yourself; only when stuck do you uncover the next line. When the book says "expanding, we get $(x+3)^2 = x^2 + 6x + 9$," do not nod and move on — do the expansion: $(x+3)(x+3) = x^2 + 3x + 3x + 9 = x^2 + 6x + 9$, and confirm it matches. Recognition is a trap; it feels like understanding and isn’t. If your line doesn’t match the book’s, you have found a gap **right now**, on your couch, instead of on the exam.' },
      { type: 'h2', text: 'Interrogate every "why"' },
      { type: 'ul', items: [ 'Why is this step allowed? (What rule licenses it?)', 'Why this approach and not another? (What made the author pick it?)', 'Where would this break? (Does it need $x \\ne 0$? A positive number under the root?)', 'Can I restate the definition in my own words without peeking? A definition you can’t restate is one you’ve only memorized, not understood.' ] },
      { type: 'h2', text: 'A reading loop that works' },
      { type: 'ol', items: [ 'Skim the section once fast — just the headings, theorems, and bold terms — to see the shape.', 'Read slowly with a pen, re-deriving every example and filling every "clearly."', 'Do 2–3 problems immediately, before the method cools.', 'Close the book and write, from memory, the one or two key ideas of the section.' ] },
      { type: 'callout', variant: 'warn', label: 'WATCH OUT', text: 'Highlighting is not reading. A page glowing with yellow marker is a page you have decorated, not learned. The pen should be writing math, not coloring sentences.' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'There is a live debate about whether the textbook should even be the center of learning.' },
      { type: 'ul', items: [ 'The **traditional** view: a well-written text is the backbone. Read it carefully, work its problems, and you have a complete, coherent path — video and apps are supplements at best.', 'The **multimedia** view: many learners absorb a concept far faster from a great video (3Blue1Brown, Khan Academy) that animates the intuition, then use the book mainly as a problem source. Dense prose, they argue, is a needless bottleneck for the first exposure.', 'The reconciling point most educators accept: **intuition** can come from anywhere — video, a teacher, a picture — but **fluency** only comes from doing problems with a pen, and the textbook is still the richest, most reliable problem source you have.' ] },
      { type: 'pull', text: 'If your textbook still looks new at the end of the term, you didn’t read it. You looked at it.' }
    ],
    sources: [
      { label: 'Paul Halmos, How to write — and read — mathematics (advice tradition)', url: 'https://en.wikipedia.org/wiki/Paul_Halmos' },
      { label: 'Make It Stick (Brown, Roediger, McDaniel) — on the illusion of fluency', url: 'https://www.hup.harvard.edu/books/9780674729018' },
      { label: 'Kalid Azad, BetterExplained — intuition-first learning', url: 'https://betterexplained.com/' }
    ]
  },
  {
    id: 'studying-for-test',
    title: 'Studying for a math test',
    dek: 'Re-reading your notes feels productive and barely works. Retrieval and spacing feel hard and actually work.',
    readMins: 8,
    blocks: [
      { type: 'p', text: 'Most studying is a comfortable lie. You re-read the chapter, re-watch the lecture, look over the worked solutions, and feel a warm glow of familiarity. Then the test asks you to **produce** the answer from a blank page and the glow evaporates. The cognitive scientists behind **Make It Stick** have a name for this trap: fluency mistaken for mastery. The fix is to study in the way the test will ask.' },
      { type: 'h2', text: 'Retrieve, space, and interleave' },
      { type: 'p', text: 'The single most powerful study tool is **pulling the answer out of your own head** with the book closed. Re-reading lets you recognize the material; retrieval forces you to reconstruct it — and reconstruction is exactly what a test demands. Make It Stick puts it bluntly: the effort of recall is what builds durable memory. If it feels easy, it isn’t working.' },
      { type: 'ul', items: [ '**Space it out.** Four one-hour sessions across a week beat one four-hour cram, even at identical total time — a little forgetting between sessions, then re-retrieving the half-faded material, is what cements it. Test Friday? Study Monday, Tuesday, Thursday.', '**Interleave topics.** Don’t do twenty problems of one type in a row; mix factoring, the quadratic formula, and completing the square. That practices the harder skill of **choosing** the method — which the test won’t hand you either.' ] },
      { type: 'h2', text: 'Redo every problem you missed' },
      { type: 'p', text: 'Your wrong answers are a personalized map of exactly what you don’t know yet — the most valuable study material you own. Keep an **error log**: copy each missed problem, and a day or two later, redo it from scratch on a blank page. Not "read the solution again" — **solve it again**, cold. If you can’t, do it a third time later. Getting it wrong was never the failure. Not coming back to it is.' },
      { type: 'h2', text: 'Teach it aloud' },
      { type: 'p', text: 'Explain each topic out loud as if to a confused friend — the **Feynman technique**. The moment you stumble, mumble, or wave your hands, you have found the exact spot you don’t actually understand. Go back, patch it, and explain again cleanly. If you can explain it to a kid, you understand it. If you can’t, you only think you do. (And beware the three most popular study methods — highlighting, re-copying notes, re-watching lectures — which are three of the least effective: they feel productive precisely because they’re easy, and easy is the warning sign.)' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'The evidence for retrieval and spacing is overwhelming. The disagreement is about how much **timed, high-stakes testing** should drive all this.' },
      { type: 'ul', items: [ 'The **testing-effect** researchers (the Make It Stick authors) emphasize that frequent low-stakes quizzing is itself one of the best ways to learn — testing isn’t just measurement, it’s practice.', 'Critics led by **Jo Boaler** argue that high-pressure, timed math tests induce anxiety that blocks working memory, so they measure speed-under-stress more than understanding — and can turn students off math entirely.', 'The reconciling view: the *format* matters. **Low-stakes, untimed retrieval** (self-quizzing, flashcards, redoing problems) captures the learning benefit without the anxiety cost. Use testing as a study tool, not as a stopwatch.' ] },
      { type: 'pull', text: 'If your studying feels easy and pleasant, you’re probably not learning. The discomfort of recall is the sound of memory being built.' }
    ],
    sources: [
      { label: 'Brown, Roediger & McDaniel, Make It Stick (Harvard University Press)', url: 'https://www.hup.harvard.edu/books/9780674729018' },
      { label: 'Jo Boaler, Mathematical Mindsets / youcubed', url: 'https://www.youcubed.org/resource/mathematical-mindsets/' },
      { label: 'The Feynman Technique — learning by explaining', url: 'https://en.wikipedia.org/wiki/Richard_Feynman' }
    ]
  },
  {
    id: 'test-day-execution',
    title: 'Test-day execution',
    dek: 'You already know the math. Now don’t lose points to panic, bad triage, or a careless minus sign.',
    readMins: 7,
    blocks: [
      { type: 'p', text: 'On test day your job changes. The learning is done; now it is about **converting** what you know into points with the least leakage. Most lost marks on a test you were ready for come not from ignorance but from execution: a question attacked in the wrong order, work that wasn’t shown, a sign dropped under time pressure. These are all fixable with a plan.' },
      { type: 'h2', text: 'Triage, then bank the easy points' },
      { type: 'p', text: 'Before writing a single solution, spend ninety seconds skimming the whole test and marking each question **easy**, **doable**, or **hard**. Then do the easy ones first. A point from question 1 is worth exactly as much as a point from question 10 and costs a fraction of the time — bank every guaranteed point before you gamble on a hard one. Points per minute is the only currency that matters: an easy question might pay 5 points in 2 minutes, a hard one 5 points in 15. A few quick wins early also calm your nerves for the hard ones.' },
      { type: 'h2', text: 'Show your work, and check by estimation' },
      { type: 'p', text: 'Write each step down, even ones you could do in your head. Most graders give **partial credit** for a correct method with a wrong final number, and your written steps are the only way to catch your own mistakes on the check pass — a naked wrong answer earns zero, while the same wrong answer with correct visible work often earns most of the marks. Then, after each answer, take five seconds to ask: is this even plausible? If a problem asks for the area of a small room and you got $4000$ square meters — the size of a soccer field — something is wrong. Estimation catches the catastrophic errors, a misplaced decimal or a wrong operation, that cost the most points.' },
      { type: 'h2', text: 'Manage time without panicking' },
      { type: 'ul', items: [ 'Divide total time by the number of questions to get a rough **budget** per question. Glance at the clock at the halfway mark, not constantly.', 'If a question runs over budget, **leave it** and come back. A half-finished hard problem is parked, not abandoned. Sinking fifteen minutes into the hardest problem out of pride, then running out of time on three easy ones, is the classic disaster.', 'When panic rises, stop and take one slow breath. Anxiety eats working memory — the very thing you need. Three seconds of calm buys back more than it costs.', 'Save the last five minutes to scan for blanks, dropped negatives, and questions you skipped. Never finish early and sit there — spend it checking.' ] },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'The sharpest live debate in math education touches test day directly: should math tests be **timed** at all?' },
      { type: 'ul', items: [ 'The **traditional** position: speed reflects fluency, timed conditions are fair and standardized, and the real world (and later exams) imposes deadlines, so students should practice under them.', 'The **critique**, led by Jo Boaler, holds that timed tests trigger anxiety that floods working memory and disproportionately harms capable students who think deeply rather than fast — measuring panic-resistance, not math.', 'A growing middle ground: keep classroom assessment **low-stakes and largely untimed** to measure understanding, while still teaching time-management skills for the timed exams students will inevitably face. You can reject the philosophy of timed tests and still prepare wisely for the ones that exist.' ] },
      { type: 'pull', text: 'You don’t rise to the occasion on test day — you fall back on your triage. Decide the plan before the clock starts.' }
    ],
    sources: [
      { label: 'Jo Boaler, "Fluency Without Fear" (youcubed)', url: 'https://www.youcubed.org/evidence/fluency-without-fear/' },
      { label: 'Brown, Roediger & McDaniel, Make It Stick', url: 'https://www.hup.harvard.edu/books/9780674729018' },
      { label: 'G. Pólya, How to Solve It (the "look back" check)', url: 'https://press.princeton.edu/books/paperback/9780691164076/how-to-solve-it' }
    ]
  },
  {
    id: 'beating-math-anxiety',
    title: 'Beating math anxiety',
    dek: 'The panic that wipes your mind blank is real, common, and beatable — starting with what you believe about your own brain.',
    readMins: 8,
    blocks: [
      { type: 'p', text: 'Math anxiety is not a character flaw and it is not rare — it is a measurable physiological response, and at its worst it hijacks the exact mental resource you need. When anxiety spikes, it floods **working memory**, the small mental scratchpad where you hold the numbers you’re juggling. That is why a capable person can go blank on $7 \\times 8$ under pressure: you haven’t forgotten the math, the anxiety is occupying the workspace where the math would happen. The good news — anxiety is learned, which means it can be unlearned.' },
      { type: 'callout', label: 'INTUITION', text: 'A blanked mind in a test is not an empty one. The fear is sitting in the chair the math needs. Your first job under pressure is not to compute — it is to settle.' },
      { type: 'h2', text: 'Your brain isn’t fixed, and mistakes grow it' },
      { type: 'p', text: 'Carol Dweck’s research separates two beliefs. A **fixed mindset** says ability is a fixed trait — you’re either a "math person" or you’re not. A **growth mindset** says ability grows with effort and practice. This is not just feel-good talk: students with a growth mindset persist longer on hard problems and improve more, because they read struggle as **growth in progress** rather than proof of inadequacy. Jo Boaler adds a striking finding from neuroscience — making a mistake, even one you don’t consciously notice, produces measurable synaptic growth that getting it right does not. The error is not the opposite of learning; it is a **moment of learning**. Getting it wrong is the work, not the failure. (A corollary: praising someone for being "so smart" quietly installs a fixed mindset — praise the effort and the strategy, not the trait.)' },
      { type: 'h2', text: 'The timed-test critique' },
      { type: 'p', text: 'Boaler argues that timed tests are a leading manufacturer of math anxiety, especially in young children: the stress of the clock floods working memory, the student blanks, concludes "I’m bad at math," and a lifelong aversion is born from a stopwatch. She notes that mathematicians are rarely the fastest — deep thinking is often slow — so training kids to equate math with speed teaches them the wrong thing about the subject entirely.' },
      { type: 'ul', items: [ 'Reframe the body’s signals: a racing heart before a test is **arousal**, not doom. Telling yourself "I’m excited" rather than "I’m terrified" measurably improves performance.', 'Try a brief **expressive writing** dump before the test — a few minutes writing out your worries has been shown to free up working memory.', 'Build a base of easy wins. Confidence is evidence-based; stack small successes so your brain has data that contradicts "I can’t do this."', 'Separate speed from skill. Practice untimed until the method is solid, then add a clock gradually only if you need one.' ] },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'Growth mindset and the anti-timed-test argument are influential — and genuinely contested.' },
      { type: 'ul', items: [ 'The **Boaler / Dweck** camp: mindset interventions and removing timed pressure reduce anxiety and open math to far more students.', 'A **skeptical** camp points to large replication studies showing growth-mindset interventions often produce **small** average effects, concentrated in the students who were struggling most — not the transformation early headlines promised. Some also defend timed fluency as a real, useful skill that frees working memory for harder thinking once basic facts are automatic.', 'The fair synthesis: **automaticity matters** — knowing $7 \\times 8 = 56$ instantly really does free your mind for the hard part — but it should be built through low-pressure spaced practice, not anxiety-inducing timed drills. You can chase fluency without the stopwatch.' ] },
      { type: 'pull', text: 'You are not a "math person" or not. You are a person who has, or hasn’t yet, practiced this particular thing.' }
    ],
    sources: [
      { label: 'Carol Dweck, Mindset: The New Psychology of Success', url: 'https://www.mindsetworks.com/science/' },
      { label: 'Jo Boaler, "Fluency Without Fear" (youcubed)', url: 'https://www.youcubed.org/evidence/fluency-without-fear/' },
      { label: 'Math anxiety and working memory — Wikipedia overview', url: 'https://en.wikipedia.org/wiki/Mathematical_anxiety' }
    ]
  },
  {
    id: 'sanity-checking',
    title: 'Sanity-checking answers',
    dek: 'Four fast ways to catch a wrong answer before it costs you — because the worst errors are the loud, obvious ones.',
    readMins: 7,
    blocks: [
      { type: 'p', text: 'The most damaging math errors are not the subtle ones — they are the absurd ones that a five-second glance would have caught. A negative length, an area smaller than one of its sides, a decimal in the wrong place turning $4.5$ into $45$. Sanity-checking is the cheap, fast habit of asking "does this answer even make sense?" before you trust it. Here are four checks that catch most disasters.' },
      { type: 'h2', text: 'Four fast checks' },
      { type: 'ul', items: [ '**Check the units.** They must come out right, and tracking them often reveals the mistake by itself. A speed ($\\text{km}/\\text{h}$) times a time ($\\text{h}$) cancels the hours and leaves $\\text{km}$ — a distance. If your "distance" came out in $\\text{km}/\\text{h}^2$, you multiplied where you should have divided. Area is square units; volume is cubic. Wrong units means wrong answer, full stop.', '**Check the order of magnitude.** Round every number to one significant figure and redo it roughly in your head for the **ballpark**. If you compute $19.8 \\times 4.9$ and get $9.7$, the estimate $20 \\times 5 = 100$ screams that you’re off by a factor of ten.', '**Cast out nines.** The repeated **digit sum** of a number must stay consistent across an operation. For $327 \\times 12 = 3924$: $327 \\to 3+2+7 = 12 \\to 3$, and $12 \\to 3$, so $3 \\times 3 = 9$. The answer: $3+9+2+4 = 18 \\to 9$. Both sides give $9$, so it passes. (It misses a swapped pair of digits — no single check is perfect.)', '**Ask: does this make sense?** The broadest and most powerful check. A probability above $1$ is impossible; a discount that raises the price is wrong; if $30$ people split a bill and each owes $\\$400$, reread the problem. Plug your answer back in and see if the story holds.' ] },
      { type: 'callout', label: 'WHY IT WORKS', text: 'Casting out nines works because a number and its digit sum leave the same remainder when divided by $9$. Operations preserve that remainder, so if the remainders don’t match, the arithmetic is wrong somewhere.' },
      { type: 'h2', text: 'A worked sanity check' },
      { type: 'p', text: 'Suppose you solve "a jacket is $\\$80$ after a $20\\%$ discount; what was the original price?" and you get $\\$64$. Run all four checks. **Units:** dollars, correct. **Make sense?** No — a discount should make the new price *lower* than the original, but $\\$64$ is lower than $\\$80$, so the original can’t be $\\$64$. That fails immediately. Redo: $80\\%$ of the original is $\\$80$, so the original is $80 \\div 0.8 = \\$100$. **Order of magnitude:** $\\$100$ is in the right ballpark for an $\\$80$ sale price. **Verify forward:** $20\\%$ off $\\$100$ is $\\$100 - \\$20 = \\$80$. It all closes. The sanity check caught a real error and pointed at the fix.' },
      { type: 'callout', variant: 'warn', label: 'WATCH OUT', text: 'A sanity check passing does not prove your answer is right — it only fails to prove it wrong. Use it to catch disasters fast, not as a substitute for solving carefully. It’s a smoke detector, not a guarantee.' },
      { type: 'h2', text: 'Where experts disagree' },
      { type: 'p', text: 'Sanity-checking is universally praised, but it sits inside a bigger fight: **calculators and number sense**.' },
      { type: 'ul', items: [ 'One camp argues calculators free students from tedious arithmetic to focus on real reasoning — and that estimation and sanity-checking are *more* important precisely because a calculator will happily display a wrong answer with total confidence.', 'The other camp warns that leaning on calculators too early erodes the mental number sense that makes sanity-checking possible in the first place — if you have no feel for what $19 \\times 5$ should be, you can’t catch the calculator when your finger slips.', 'Most educators land here: build genuine number sense and estimation first so a student can smell a wrong answer, *then* let the calculator handle the grinding. The calculator computes; only you can sanity-check.' ] },
      { type: 'pull', text: 'A calculator will give you a wrong answer with total confidence. Only you can ask whether it makes sense.' }
    ],
    sources: [
      { label: 'G. Pólya, How to Solve It (the "look back" stage)', url: 'https://press.princeton.edu/books/paperback/9780691164076/how-to-solve-it' },
      { label: 'Casting out nines — Wikipedia', url: 'https://en.wikipedia.org/wiki/Casting_out_nines' },
      { label: 'Stanislas Dehaene, The Number Sense', url: 'https://global.oup.com/academic/product/the-number-sense-9780199753871' }
    ]
  }
];

<script>/* methods_1.js */
window.AXIOM_METHODS_1 = [
  {

// ================================================================
// MATH ENGINE — a tiny, safe expression evaluator.
// This is the heart of honest answer-checking: instead of string
// matching, we PARSE the student's input into a function of x and
// compare it numerically to the reference answer. That makes
// 2x == x*2 == x+x, and (x+2)(x+3) == x^2+5x+6, all "equal" — we
// test equality the way a mathematician does: by evaluation.
// No eval(); a hand-written recursive-descent parser. Supports
// + - * / ^, parentheses, unary minus, decimals, implicit
// multiplication (2x, 3(x+1), (x+1)(x+2)), sqrt/abs/sin/cos/tan/ln,
// and the constants pi and e.
// ================================================================
var FUNCS = { sqrt:Math.sqrt, abs:Math.abs, sin:Math.sin, cos:Math.cos, tan:Math.tan, ln:Math.log, log:function(x){return Math.log(x)/Math.LN10;}, log10:function(x){return Math.log(x)/Math.LN10;}, exp:Math.exp };
function tokenize(str){
  var s = String(str).replace(/\s+/g,'')
    .replace(/[−]/g,'-')      // unicode minus
    .replace(/[×]/g,'*')      // ×
    .replace(/[÷]/g,'/')      // ÷
    .replace(/\*\*/g,'^')
    .replace(/[{}]/g,function(c){ return c==='{'?'(':')'; })  // accept LaTeX-style x^{2}
    .replace(/π/g,'pi');                                       // accept the π glyph (e.g. "25π")

  while(i<s.length){
    var c=s[i];
    if(/[0-9.]/.test(c)){ var n=''; while(i<s.length && /[0-9.]/.test(s[i])){ n+=s[i++]; }
      // scientific notation (1e2, 2.5e-3) — only when 'e' is followed by a digit
      // (or a sign then a digit), so "2e" still means 2·e (Euler's number).
      if(s[i]==='e' && (/[0-9]/.test(s[i+1]) || ((s[i+1]==='+'||s[i+1]==='-') && /[0-9]/.test(s[i+2])))){
        n+=s[i++]; if(s[i]==='+'||s[i]==='-') n+=s[i++]; while(i<s.length && /[0-9]/.test(s[i])) n+=s[i++];
      }
      toks.push({t:'num',v:parseFloat(n)}); continue; }
    if(/[a-zA-Z]/.test(c)){ var id=''; while(i<s.length && /[a-zA-Z]/.test(s[i])){ id+=s[i++]; } toks.push({t:'id',v:id.toLowerCase()}); continue; }
    if('+-*/^()'.indexOf(c)>=0){ toks.push({t:c}); i++; continue; }
    throw new Error('bad char '+c);
  }
  return toks;
}
function parseExpr(toks, scope){
  // recursive descent; pos is closure-shared
  var pos=0;
  function peek(){ return toks[pos]; }
  function eat(t){ var tk=toks[pos]; if(!tk||(t&&tk.t!==t)) throw new Error('expected '+t); pos++; return tk; }
  function parseE(){ // additive
    var v=parseT();
    while(peek() && (peek().t==='+'||peek().t==='-')){ var op=eat().t; var r=parseT(); v = op==='+'? v+r : v-r; }
    return v;
  }
  function parseT(){ // multiplicative + implicit multiplication
    var v=parseU();
    while(peek()){
      var tk=peek();
      if(tk.t==='*'||tk.t==='/'){ var op=eat().t; var r=parseU(); v = op==='*'? v*r : v/r; }
      else if(tk.t==='num'||tk.t==='id'||tk.t==='('){ // implicit multiply (same precedence, left-assoc)
        var r2=parseU(); v = v*r2;
      } else break;
    }
    return v;
  }
  function parseU(){ // unary +/- — binds LOOSER than ^ so -3^2 = -(3^2) = -9 (standard)
    var tk=peek();
    if(tk && tk.t==='-'){ eat('-'); return -parseU(); }
    if(tk && tk.t==='+'){ eat('+'); return parseU(); }
    return parseF();
  }
  function parseF(){ // power (right assoc), applied to a base; exponent may be unary (2^-3)
    var b=parseB();
    if(peek() && peek().t==='^'){ eat('^'); var e=parseU(); return Math.pow(b,e); }
    return b;
  }
  function parseB(){
    var tk=peek();
    if(!tk) throw new Error('unexpected end');
    if(tk.t==='num'){ eat('num'); return tk.v; }
    if(tk.t==='('){ eat('('); var v=parseE(); eat(')'); return v; }
    if(tk.t==='id'){
      eat('id'); var name=tk.v;
      if(FUNCS[name] && peek() && peek().t==='('){ eat('('); var arg=parseE(); eat(')'); return FUNCS[name](arg); }
      if(name==='pi') return Math.PI;
      if(name==='e') return Math.E;
      if(scope && (name in scope)) return scope[name];
      throw new Error('unknown id '+name);
    }
    throw new Error('parse error');
  }
  var result=parseE();
  if(pos!==toks.length) throw new Error('trailing tokens');
  return result;
}
function evalExpr(str, scope){
  // returns Number or NaN on failure (never throws to callers)
  try{
    var v = parseExpr(tokenize(str), scope||{});

  }catch(e){ return NaN; }
}
function closeEnough(a,b){
  if(!isFinite(a)||!isFinite(b)) return false;
  var tol = 1e-6 * Math.max(1, Math.abs(a), Math.abs(b));
  return Math.abs(a-b) <= tol;
}
// numeric / fraction equivalence: "1/2"=="0.5"=="2/4". A leading single-variable
// label is tolerated so "x = 0" grades the same as "0" on solve-for-x problems.
function acceptNumeric(input, target){
  var s = String(input).replace(/^\s*[a-zA-Z]\s*=\s*/, '');
  var v = evalExpr(s);

}
// algebraic equivalence: sample x at several points; equal everywhere → equal
var SAMPLE_XS = [0.37, 1.13, 2.7, -1.4, 3.9, -2.6, 5.1];
function acceptExpr(input, answerExpr, vars){
  vars = vars || ['x'];
  var valid=0;
  for(var i=0;i<SAMPLE_XS.length;i++){
    var scope={}; for(var k=0;k<vars.length;k++){ scope[vars[k]] = SAMPLE_XS[(i+k)%SAMPLE_XS.length]; }
    var a = evalExpr(input, scope), b = evalExpr(answerExpr, scope);
    var af=isFinite(a), bf=isFinite(b);
    if(!af && !bf) continue;          // both undefined at this x → domain edge, skip (handles sqrt/log)
    if(af!==bf) return false;         // one defined, the other not → not equal
    if(!closeEnough(a,b)) return false;
    valid++;
  }

}
// antiderivative equivalence: input and answer may differ by a constant (+C).
// We bind the symbol c→0 (tokenizer lowercases, so a literal "+C" resolves) so
// the instructed "(3/2)x^2 + C" form grades correctly instead of becoming NaN.
function acceptUpToConstant(input, answerExpr){
  var diffs=[];
  for(var i=0;i<SAMPLE_XS.length;i++){
    var scope={x:SAMPLE_XS[i], c:0, k:0};   // "+C" or "+k" both read as a free constant
    var a=evalExpr(input,scope), b=evalExpr(answerExpr,scope);
    if(!isFinite(a)||!isFinite(b)) return false;
    diffs.push(b-a);
  }
  for(var j=1;j<diffs.length;j++){ if(!closeEnough(diffs[j],diffs[0])) return false; }

// set equality for multi-root answers ("2, -3" == "-3,2" == "x=2 or x=-3")
function acceptSet(input, targets){
  // tolerate set-brace notation {4, -2} and "x=" labels
  var parts = String(input).toLowerCase().replace(/[{}]/g,'').replace(/x\s*=/g,'').split(/[,;]|\bor\b|\band\b/);
  var vals=[];
  for(var i=0;i<parts.length;i++){ var p=parts[i].trim(); if(!p) continue; var v=evalExpr(p); if(!isFinite(v)) return false; vals.push(v); }
  // a repeated root may be given once: "4" is fine for the double root {4,4}
  if(vals.length===1 && targets.length>1 && targets.every(function(t){ return closeEnough(t, targets[0]); })){
    return closeEnough(vals[0], targets[0]);
  }
  if(vals.length!==targets.length) return false;
  var used=targets.map(function(){return false;});
  for(var a=0;a<vals.length;a++){
    var found=false;
    for(var b=0;b<targets.length;b++){ if(!used[b] && closeEnough(vals[a],targets[b])){ used[b]=true; found=true; break; } }
    if(!found) return false;
  }
  return true;
}
// pair equality for systems ("x=2, y=3")
function acceptPair(input, tx, ty){
  var s = String(input).toLowerCase();
  // If the answer is explicitly labelled, bind by NAME so either ordering
  // works: "y=3, x=2" must grade the same as "x=2, y=3".
  var mx = s.match(/x\s*=\s*(-?[0-9.\/+*^()e\s]+?)(?=[,;]|\by\b|y\s*=|$)/);
  var my = s.match(/y\s*=\s*(-?[0-9.\/+*^()e\s]+?)(?=[,;]|\bx\b|x\s*=|$)/);
  if(mx && my){
    var vx=evalExpr(mx[1].trim()), vy=evalExpr(my[1].trim());
    if(!isFinite(vx)||!isFinite(vy)) return false;
    return closeEnough(vx,tx) && closeEnough(vy,ty);
  }
  // Otherwise fall back to positional (x, y) order.
  var nums = s.replace(/[xy]\s*=/g,'').split(/[,;()]/).map(function(t){return t.trim();}).filter(Boolean);
  if(nums.length<2) return false;
  var a=evalExpr(nums[0]), b=evalExpr(nums[1]);

// "Simplify"-style answers must be given in LOWEST TERMS — accepting the bare
// decimal or an unreduced fraction would defeat the exercise. rp/rq is the
// already-reduced target (gcd(rp,rq)===1).
function acceptReducedFraction(input, rp, rq){
  var s = String(input).trim().replace(/\s+/g,'').replace(/[()]/g,'');
  var m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if(m){
    var p=parseInt(m[1],10), q=parseInt(m[2],10);
    if(q===0) return false;
    if(q<0){ p=-p; q=-q; }                 // normalize sign to the numerator
    if(gcd(p,q)!==1) return false;          // reject unreduced (e.g. 2/4 for 1/2)
    return p===rp && q===rq;
  }
  // a bare integer is only acceptable when the reduced form IS an integer
  if(rq===1) return acceptNumeric(s, rp);

// ================================================================
// SEEDED RNG (mulberry32) — deterministic generators for the
// Problem of the Day (same problem for everyone on a given date).
// ================================================================
function mulberry32(seed){
  var s = seed>>>0;
  return function(){
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    var t = Math.imul(s ^ (s>>>15), 1 | s);
    t = (t + Math.imul(t ^ (t>>>7), 61 | t)) ^ t;
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  };
}

function pick(rng,arr){ return arr[Math.floor(rng()*arr.length)]; }

}

// ================================================================
// SKILL GENERATORS — procedural skills.  Every generator returns
// { promptTeX, answer (canonical display), accept(input)->bool,
//   solutionTeX, hints[] }.  `diff` (0..3) scales difficulty with
// mastery so practice stays in the productive-struggle zone.
// All are node-tested: generate() never produces an answer its own
// accept() would reject.
//
// Polynomial-formatting helpers keep generated algebra clean: never "1x",
// "+0x", "(x+0)" or "Subtract 0". cterm = leading coefficient·var (1->"x",
// -1->"-x", 0->""); sterm = a signed term to append (" + 3x", " - x", "" if 0);
// sconst = a signed constant (" + 5", " - 3", "" if 0).
// ================================================================
function cterm(n, v){ n=+n; if(n===0) return '0'; if(n===1) return v; if(n===-1) return '-'+v; return n+v; }

// Every generator receives diff 0..4 (mapped 1:1 from the skill's adaptive
// tier 1..5). byDiff(diff,[a,b,c,d,e]) selects the value for this level, so a
// generator's difficulty progression is explicit and monotonic. Lower levels
// MUST stay genuinely easy: keep magnitudes small and hold back negatives /

// ================================================================
// MASTERY + SPACED REPETITION
// Leitner-style boxes. A correct answer promotes the skill to the
// next box and pushes its next review further out; a miss drops it
// back to "soon". The intervals widen (1→3→7→16→35 days) because
// the spacing effect says you remember best when you're reviewed
// just before you'd forget — and that gap grows as memory sets.
// ================================================================
var SR_DAYS = [0, 1, 3, 7, 16, 35];   // legacy Leitner intervals (migration source only)
var TARGET_TIER = 4;                   // generator difficulty tier that counts as "real mastery"
// ----------------------------------------------------------------
// ADAPTIVE LEARNER MODEL (research-grounded; see memory). Three layers per skill:
//  • theta  — Elo ability (logit) → drives difficulty selection + weakness ranking
//  • L      — Bayesian Knowledge Tracing P(known) → the displayed mastery
//  • S/D    — FSRS-5 stability(days)/difficulty → spaced-review scheduling
// plus tier (1-5 generator difficulty, managed by the 85%-rule hysteresis).
// Legacy {box, dueDate} are kept derived so old UI/achievements still work.
// ----------------------------------------------------------------
function statFor(id){
  var st=state.skillStats[id];
  if(!st){ st={ attempts:0, correct:0, streak:0, box:0, mastery:0, lastSeen:0, dueDate:0 }; state.skillStats[id]=st; }
  if(st.theta===undefined){           // one-time migration from a Leitner box
    var box=st.box||0;
    st.theta = clamp((box-2.5)*0.6, -2, 2);
    st.L  = [0.20,0.35,0.50,0.70,0.85,0.95][box]!=null ? [0.20,0.35,0.50,0.70,0.85,0.95][box] : 0.25;
    st.S  = [0,1,3,8,21,60][box] || 0;
    st.D  = 5;
    st.tier = clamp(box||1, 1, 5);
    st.n  = st.attempts||0;
    st.recent = [];
    st.firstAcc = st.attempts ? st.correct/st.attempts : null;
    st.lastReview = st.lastSeen || 0;
  }
  return st;
}
// FSRS-5 (simplified) — power-law retrievability + stability/difficulty update.
var FSRS_W={w6:1.46,w7:0.51,w8:1.54,w9:0.11,w10:1.94,w11:1.94,w12:0.11,w13:0.29,w14:2.27};
function fsrsD0(g){ return clamp(7.1949 - Math.exp(0.5345*(g-1)) + 1, 1, 10); }
function scheduleFSRS(st, grade, t){
  var W=FSRS_W;
  if(!st.S){ st.S=[0.40,1.18,3.17,15.69][grade-1]; st.D=fsrsD0(grade); }
  else{
    var R=Math.pow(1+(19/81)*(t/st.S), -0.5);
    if(grade===1){ st.S = W.w11*Math.pow(st.D,-W.w12)*(Math.pow(st.S+1,W.w13)-1)*Math.exp(W.w14*(1-R)); }
    else{ var a=Math.exp(W.w8)*(11-st.D)*Math.pow(st.S,-W.w9)*(Math.exp(W.w10*(1-R))-1)+1; st.S*=a; }
    var Dn=st.D+(-W.w6*(grade-3))*(10-st.D)/9;
    st.D=clamp(W.w7*fsrsD0(4)+(1-W.w7)*Dn, 1, 10);
  }
  st.S=clamp(st.S, 0.4, 365);
  var r=(state.settings&&state.settings.targetRetention)||0.90;
  var interval=clamp((st.S*81/19)*(Math.pow(r,-2)-1), 1, 365);
  st.lastReview=now();
  st.dueDate=st.lastReview + interval*DAY;
}
// live retrievability (probability of recall right now) — for display + due queue
function recall(st){ return (st && st.S) ? Math.pow(1+(19/81)*((now()-(st.lastReview||now()))/DAY)/st.S, -0.5) : (st&&st.attempts?0.5:0); }
function wilsonLB(c, w){ var n=c+w; if(!n) return 0; var z=1.28, ph=(c+1)/(n+2); return clamp((ph+z*z/(2*n)-z*Math.sqrt((ph*(1-ph)+z*z/(4*n))/n))/(1+z*z/n),0,1); }
function masteryPct(st){ if(!st||!st.attempts) return 0; return Math.round(100*st.L*(st.S?recall(st):1)); }
// 5-state mastery ladder (Khan-style) gated so easy-only practice can't trigger "mastered"
function masteryState(st){
  if(!st||!st.attempts) return 'new';
  var lb=wilsonLB(st.correct, st.attempts-st.correct);
  if(st.L>=0.95 && lb>=0.85 && st.tier>=TARGET_TIER && st.S>=21 && recall(st)>0.6) return 'mastered';
  if(lb>=0.70 && st.attempts>=5) return 'proficient';
  if(st.L>=0.55 && st.attempts>=3) return 'familiar';
  return 'attempted';
}
// "can vs cannot do" with confidence (relative to the skill's target difficulty)
function abilitySE(st){ return 1/Math.sqrt(0.6 + (st.n||0)*0.16); }   // shrinks with attempts
function canDoState(st){
  if(!st||!st.attempts) return 'unknown';
  var bT=(TARGET_TIER-3)*0.9, se=abilitySE(st);
  if(st.theta-1.4*se > bT) return 'can';
  if(st.theta+1.4*se < bT) return 'cannot';
  return 'building';
}
function weaknessScore(st){
  var ids=Object.keys(state.skillStats).filter(function(k){return state.skillStats[k].attempts>0 && SKILL_BY_ID[k];});
  var mu=mean(ids.map(function(k){return state.skillStats[k].theta;}));
  var se=abilitySE(st);
  return ((mu-st.theta)/Math.max(se,0.3)) * (1+0.5*(1-recall(st)));   // recency-weighted
}
// pick the generator difficulty tier for the next item (desirable difficulty)
function pickTier(st, review){
  return clamp(review ? st.tier-1 : st.tier, 1, 5);   // tier is hysteresis-managed at ~85% success
}
function recordAnswer(id, correct, itemTier){
  var st = statFor(id);
  var y = correct?1:0;
  var b = ((itemTier!=null?itemTier:st.tier)-3)*0.9;
  var elapsed = st.lastReview ? Math.max(0,(now()-st.lastReview)/DAY) : 0;
  // (A) Elo ability update (adaptive K decays with experience; clamp anti-fluke)
  var p = sig(st.theta - b);
  var K = 0.6/(1+0.05*(st.n||0));
  st.theta += clamp(K*(y-p), -0.8, 0.8);
  st.n = (st.n||0)+1;
  // (B) Bayesian Knowledge Tracing → displayed mastery
  var SLIP=0.10, GUESS=0.20, LEARN=0.15;
  var Lpost = y ? (st.L*(1-SLIP))/(st.L*(1-SLIP)+(1-st.L)*GUESS)
               : (st.L*SLIP)/(st.L*SLIP+(1-st.L)*(1-GUESS));
  st.L = clamp(Lpost + (1-Lpost)*LEARN, 0, 0.999);
  // (C) FSRS-5 scheduling; a miss re-queues soon for same-session retry
  scheduleFSRS(st, y?3:1, elapsed);
  if(!correct) st.dueDate = now() + 10*60000;
  // (D) recent ring + tier hysteresis (the 85% rule)
  st.recent = st.recent||[]; st.recent.push(y); if(st.recent.length>20) st.recent.shift();
  var tail=st.recent.slice(-3), ts=tail.reduce(function(a,c){return a+c;},0);
  if(tail.length===3 && ts===3){ st.tier=clamp(st.tier+1,1,5); st.recent=[]; }
  else if(tail.length===3 && ts<=1){ st.tier=clamp(st.tier-1,1,5); st.recent=[]; }
  // legacy bookkeeping + derived box (keeps stars/achievements working)
  st.attempts++; if(correct) st.correct++;
  st.streak = correct ? st.streak+1 : 0;
  if(st.firstAcc==null) st.firstAcc = y;
  st.box = clamp(Math.round(st.L*5),0,5);
  st.mastery = st.box;
  st.lastSeen = now();
  // lifetime + today's history
  state.solvedTotal++; if(correct) state.correctTotal++;
  var t=todayStr(), h=null;
  for(var i=0;i<state.history.length;i++){ if(state.history[i].date===t){ h=state.history[i]; break; } }
  if(!h){ h={date:t,solved:0,correct:0}; state.history.push(h); }

// ----- adaptive session composer: due reviews + weaknesses + interleaving -----
function trackSkillIds(){
  var t=TRACKS[state.track]; var all=SKILLS.map(function(s){return s.id;});
  if(!t || t.id==='all') return all;
  var ids=all.filter(function(id){ var s=SKILL_BY_ID[id]; return s && t.topics.indexOf(s.topic)>=0; });

function countUp(node, to, suffix){

  // show the real value immediately when motion is off OR the tab is hidden
  // (a backgrounded tab throttles rAF, which would otherwise leave a stuck "0")

  function step(ts){ if(!start) start=ts; var p=clamp((ts-start)/dur,0,1); var e=1-Math.pow(1-p,3);
    node.textContent=Math.round(from+(to-from)*e)+suffix; if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}

// ================================================================
// STREAK — consecutive days with any completed practice/lesson.
// ================================================================
// Regenerate a streak freeze at most once per 7 days (cap 2). Called at launch BEFORE
// checkStreakBroken (so the break-check sees the post-grant balance) and on activity. A
// brand-new account (lastFreezeGrant null) just seeds the window — it keeps its starting
// freeze instead of jumping straight to 2.
function grantFreezeIfDue(){
  var t=todayStr();
  if(!state.lastFreezeGrant){ state.lastFreezeGrant=t; return; }
  if(dayDiff(t, state.lastFreezeGrant)>=7){ state.streakFreezes=Math.min(2,(state.streakFreezes||0)+1); state.lastFreezeGrant=t; }
}
function markActiveToday(){
  var t=todayStr(); var s=state.streak;

  if(s.lastActiveDate===t) return; // already counted today
  if(s.lastActiveDate){
    var d=dayDiff(t, s.lastActiveDate);
    if(d>3) state._comeback=true;   // returned after a multi-day break
    if(d===1){ s.current = s.current+1; }
    else if(d>1){
      // skipped (d-1) day(s): spend freezes to bridge the gap ONLY now that the
      // user is actually practicing — so passive app-opens never burn the net.
      var missed=d-1;
      if((s.current||0)>0 && (state.streakFreezes||0)>=missed){
        state.streakFreezes-=missed; s.current=s.current+1; state._freezeJustUsed=s.current;
      } else { s.current = 1; }   // gap too big for the freezes on hand → restart
    }
    else s.current = s.current||1;
  } else { s.current = 1; }
  s.lastActiveDate = t;
  s.longest = Math.max(s.longest||0, s.current);
  refreshStreakUI();
}

  var s=state.streak;

    var missed=d-1;   // whole days skipped before today (d===1 → 0, still fine)
    // A passive launch never spends a freeze. The streak only truly BREAKS once the
    // gap is bigger than your freezes could bridge; otherwise it's still recoverable
    // by practicing today (which is when markActiveToday actually spends the freeze).
    // (No saveState here — that would re-stamp updatedAt and undo stampLegacyProgress.)
    if(d>1 && missed > (state.streakFreezes||0)) s.current=0;

}
