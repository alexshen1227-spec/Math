// ================================================================
// KaTeX helpers
// ================================================================
function katexReady(){ return typeof window.katex!=='undefined'; }
// Degrade raw TeX to clean-ish text for the brief window before KaTeX loads,
// so users never see literal "\;?" / "\frac{}{}" control sequences flash.
function texToPlain(tex){
  return String(tex)
    .replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g,'$1/$2')
    .replace(/\\(times|cdot)\b/g,'×').replace(/\\div\b/g,'÷')
    .replace(/\\(le|leq)\b/g,'≤').replace(/\\(ge|geq)\b/g,'≥').replace(/\\(ne|neq)\b/g,'≠')
    .replace(/\\(pi)\b/g,'π').replace(/\\(circ)\b/g,'°').replace(/\\sqrt\b/g,'√')
    .replace(/\\text\{([^{}]*)\}/g,'$1').replace(/[{}]/g,'')
    .replace(/\^(\d+)/g,'^$1').replace(/\\[a-zA-Z]+/g,'').replace(/\\[;,!: ]/g,' ')
    .replace(/\$/g,'').replace(/\s+/g,' ').trim();
}
function renderTeX(tex, display){
  // Normalize smart quotes to ASCII: KaTeX only renders derivative primes
  // (f', g') from a straight apostrophe — a curly U+2019 would error out.
  tex = String(tex==null?'':tex).replace(/[‘’]/g, "'").replace(/[“”]/g, '"');
  if(!katexReady()) return '<span class="num">'+escapeHtml(texToPlain(tex))+'</span>';
  // htmlAndMathml: KaTeX emits a screen-reader-only <math> node alongside the
  // visual spans (which it aria-hides), so all math is readable assistively.
  // We strip the <annotation> (the raw-TeX source) so it doesn't leak duplicated
  // LaTeX into textContent / the accessibility tree — the presentation MathML
  // remains for screen readers.
  try{ return stripTexAnnotation(window.katex.renderToString(tex, {displayMode:!!display, throwOnError:false, output:'htmlAndMathml'})); }
  catch(e){ return '<span class="num">'+escapeHtml(texToPlain(tex))+'</span>'; }
}
function stripTexAnnotation(html){ return String(html).replace(/<annotation[^>]*>[\s\S]*?<\/annotation>/g, ''); }
function autoRenderMath(root){
  if(typeof window.renderMathInElement==='undefined') return;
  try{ window.renderMathInElement(root, { delimiters:[ {left:'$$',right:'$$',display:true}, {left:'$',right:'$',display:false} ], throwOnError:false, output:'htmlAndMathml', ignoredTags:['script','noscript','style','textarea','pre'] }); }catch(e){}
  // remove the raw-TeX <annotation> nodes auto-render injected
  try{ var ann=root.querySelectorAll('annotation'); for(var i=0;i<ann.length;i++) ann[i].parentNode && ann[i].parentNode.removeChild(ann[i]); }catch(e){}
}

// ================================================================
// GLOSSARY auto-linking. Build a longest-first index of terms +
// aliases; wrap the FIRST unseen occurrence of each in prose as a
// dashed-underline span (word-bounded, skipping $math$ segments).
// A shared `used` set keeps each term linked at most once per render.
// ================================================================
var GLOSS_BY_KEY = {}; var GLOSS_KEYS = [];
function buildGlossIndex(){

    if(!g||!g.term) return;
    var keys=[g.term].concat(g.aliases||[]);
    keys.forEach(function(k){ var lk=String(k).toLowerCase(); if(!GLOSS_BY_KEY[lk]){ GLOSS_BY_KEY[lk]=g; GLOSS_KEYS.push(k); } });
  });

    var key = GLOSS_KEYS[i]; var lk = key.toLowerCase();
    if(used[lk]) continue;

    if(re.test(out)){
      out = out.replace(re, function(match){ return '<span class="gloss" tabindex="0" role="button" aria-label="Definition of '+escapeHtml(match)+'" data-gk="'+escapeHtml(lk)+'">'+match+'</span>'; });

}

  var segs=[], cur='', inMath=false, i=0;
  while(i<text.length){
    var ch=text.charAt(i);
    if(ch==='\\' && text.charAt(i+1)==='$'){ cur += inMath ? '\\$' : '$'; i+=2; continue; } // escaped dollar
    if(ch==='$'){ segs.push({math:inMath, s:cur}); cur=''; inMath=!inMath; i++; continue; }
    cur+=ch; i++;
  }
  // an unclosed $ (shouldn't occur in validated content) degrades to text
  segs.push({math:false, s:(inMath?'$':'')+cur});
  return segs;
}
function prose(text, used){
  used = used || {};
  var segs = splitMath(String(text));
  var html='';
  for(var i=0;i<segs.length;i++){
    var seg=segs[i];
    if(seg.math){ html += renderTeX(seg.s, false); }
    else if(seg.s){ var e=escapeHtml(seg.s); e=e.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); e=linkifyProse(e, used); html += e; }
  }
  return html;
}
// Like prose() but renders inline math WITHOUT auto-linking glossary terms —
// used in the glossary list/popup (where self-links would be noise) so $...$
// definitions typeset instead of showing raw LaTeX.
function renderDef(text){
  var segs = splitMath(String(text==null?'':text)); var html='';
  for(var i=0;i<segs.length;i++){ var s=segs[i];
    if(s.math){ html += renderTeX(s.s, false); }
    else if(s.s){ html += escapeHtml(s.s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); }
  }
  return html;
}
// Short card previews: convert $math$ to readable plain text (no raw $, no KaTeX
// markup that could be truncated mid-token). Caller still escapeHtml()s the result.
function previewText(text){
  var segs = splitMath(String(text==null?'':text)); var out='';
  for(var i=0;i<segs.length;i++){ out += segs[i].math ? texToPlain(segs[i].s) : segs[i].s; }
  return out.replace(/\*\*/g,'');
}

function renderBlocks(blocks, used){
  used = used || {};
  var html='';
  (blocks||[]).forEach(function(b){
    if(!b||!b.type) return;
    switch(b.type){
      case 'p': html += '<p>'+prose(b.text,used)+'</p>'; break;
      case 'h2': html += '<h2>'+prose(b.text,used)+'</h2>'; break;
      case 'ul': html += '<ul>'+(b.items||[]).map(function(it){return '<li>'+prose(it,used)+'</li>';}).join('')+'</ul>'; break;
      case 'ol': html += '<ol>'+(b.items||[]).map(function(it){return '<li>'+prose(it,used)+'</li>';}).join('')+'</ol>'; break;
      case 'callout': html += '<div class="callout'+(b.variant==='warn'?' warn':'')+'"><span class="lab">'+escapeHtml(b.label||'Note')+'</span><p>'+prose(b.text,used)+'</p></div>'; break;
      case 'theorem': html += '<div class="callout theorem"><span class="lab">'+escapeHtml(b.label||'Theorem')+'</span><p>'+prose(b.text,used)+'</p></div>'; break;
      case 'definition': html += '<div class="callout definition"><span class="lab">'+escapeHtml(b.label||'Definition')+'</span><p>'+prose(b.text,used)+'</p></div>'; break;
      case 'pull': html += '<div class="pull-quote">'+prose(b.text,used)+'</div>'; break;
      case 'math': html += '<div>'+renderTeX(b.tex, true)+'</div>'; break;
      case 'video': html += '<a class="video-card" href="'+escapeHtml(b.url)+'" target="_blank" rel="noopener"><span class="play">▶</span><span><span style="display:block;font-size:13.5px;font-weight:600;color:#fff;">'+escapeHtml(b.title)+'</span><span class="micro" style="margin-top:2px;display:block;">'+escapeHtml(b.channel||'')+(b.duration?' · '+escapeHtml(b.duration):'')+'</span></span></a>'; break;

  return html;
}

    +'<circle class="ring-fill" cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke-width="'+stroke+'" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'"/></svg>';

var session=null;
function buildItemFromSkill(skill, opts){

    var st=statFor(skill.id);
    var tier=(opts.forceTier!=null)?clamp(opts.forceTier,1,5):pickTier(st, opts.review);  // 1-5, adaptive (85%-rule); forced during placement
    var diff=clamp(tier-1,0,4);                   // 1:1 tier→difficulty (tier1=easiest … tier5=hardest)
    var rng=mulberry32((hashStr(skill.id)+ (now()&0xffff) + Math.floor(Math.random()*1e6))>>>0);
    var p=skill.gen(rng,diff);
    return { skillId:skill.id, type:'input', tier:tier, promptTeX:p.promptTeX, answer:p.answer, accept:p.accept, solutionTeX:p.solutionTeX, hints:p.hints||[] };
  } else {
    var item = skill.items[Math.floor(Math.random()*skill.items.length)];
    return { skillId:skill.id, type:'choice', tier:(statFor(skill.id).tier), promptTeX:item.promptTeX, choices:item.choices, answerIndex:item.answerIndex, solutionTeX:item.solutionTeX, hints:item.hints||[] };

}

function evaluateAndShow(correct){

    + methodLink + '</div>';

    ? '<button class="btn-accent w-full rounded-xl py-3.5 text-sm font-bold" data-act="endSession">See results · '+session.score+'/'+session.total+'</button>'

function trendChart(){
  var days=[]; for(var i=13;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); days.push(todayStr(d)); }
  var vals=days.map(function(ds){ var h=state.history.filter(function(x){return x.date===ds;})[0]; return h?h.solved:0; });
  var max=Math.max(1,Math.max.apply(null,vals));
  var W=300,H=90,pad=4; var step=(W-pad*2)/(vals.length-1);
  var pts=vals.map(function(v,i){ return [pad+i*step, H-pad-(v/max)*(H-pad*2)]; });
  var line=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1);}).join(' ');
  var area=line+' L'+pts[pts.length-1][0].toFixed(1)+' '+(H-pad)+' L'+pts[0][0]+' '+(H-pad)+' Z';
  return '<svg aria-hidden="true" focusable="false" viewBox="0 0 '+W+' '+H+'" width="100%" height="90" preserveAspectRatio="none">'
    + '<line x1="0" y1="'+(H-pad)+'" x2="'+W+'" y2="'+(H-pad)+'" stroke="#262626" stroke-width="1"/>'
    + '<path d="'+area+'" fill="rgba(var(--accent-rgb),0.14)"/>'
    + '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 5px rgba(var(--accent-rgb),0.7))"/>'
    + '</svg>';
}
function calendar(){
  var now=new Date(); var y=now.getFullYear(), mo=now.getMonth();
  var first=new Date(y,mo,1).getDay(); var days=new Date(y,mo+1,0).getDate();
  var set={}; state.activeDays.forEach(function(d){ set[d]=true; });
  var h='<div class="grid grid-cols-7 gap-1.5">';
  ['S','M','T','W','T','F','S'].forEach(function(d){ h+='<div class="micro" style="text-align:center;font-size:10px">'+d+'</div>'; });
  for(var i=0;i<first;i++) h+='<div></div>';
  for(var dnum=1;dnum<=days;dnum++){
    var ds=todayStr(new Date(y,mo,dnum)); var active=set[ds]; var isToday=ds===todayStr();
    h+='<div style="aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;'
      +(active?'background:var(--accent);color:var(--on-accent);font-weight:700;box-shadow:0 0 10px rgba(var(--accent-rgb),0.5);':'background:#161616;color:#9a9a9a;')
      +(isToday&&!active?'border:1px solid var(--accent);':'')+'" class="num">'+dnum+'</div>';

function masteryByTopic(){
  // precision-weighted mastery % per topic (well-measured skills count more)
  var topics={}; SKILLS.forEach(function(s){ var st=state.skillStats[s.id]; if(!st||!st.attempts) return;
    var w=0.6+(st.n||st.attempts)*0.16; (topics[s.topic]=topics[s.topic]||[]).push({m:st.L*(st.S?recall(st):1), w:w}); });
  var keys=Object.keys(topics); if(!keys.length) return '<div style="color:var(--text-mid,#a6a6a6);font-size:13px">Practice a skill to see your mastery grow.</div>';
  return keys.map(function(tp){ var arr=topics[tp];
    var sw=arr.reduce(function(a,b){return a+b.w;},0), pct=arr.reduce(function(a,b){return a+b.m*b.w;},0)/sw;
    var col='color-mix(in srgb, var(--danger,#E5707B), var(--success,#81C784) '+Math.round(pct*100)+'%)';

}

function recommendCourse(goals){

  if(goals.focus&&goals.focus.length){ var id=focusMap[goals.focus[0]]; var c=COURSES.filter(function(x){return x.id===id;})[0]; if(c) return c; }

    case 'revealSolution': revealSolution(); break;

    case 'nextProblem': nextProblem(); break;

    case 'startPlacement': closeSheet(); startPlacement(); break;
    case 'setLibrarySub': state.librarySub=arg; state._libQuery=''; saveState(); renderLibrary(); break;
    case 'toggleBookmark': toggleBookmark(arg); break;
    case 'checkPotd': checkPotd(); break;
    case 'toggleSetting': toggleSetting(arg); break;
    case 'setAccent': setAccent(arg); break;
    case 'incGoal': state.dailyGoal=clamp((state.dailyGoal||10)+5,5,100); saveState(); openSettings(); break;
    case 'decGoal': state.dailyGoal=clamp((state.dailyGoal||10)-5,5,100); saveState(); openSettings(); break;
    case 'exportData': exportData(); break;
    case 'importData': importData(); break;
    case 'resetData': resetData(); break;
    case 'syncSignIn': syncSignIn(); break;
    case 'syncSignUp': syncSignUp(); break;
    case 'syncNow': SYNC.pullNow(); break;
    case 'syncSignOut': syncSignOut(); break;
    case 'emailAlex': window.location.href='mailto:alexshen1227@gmail.com?subject=Axiom%20feedback'; break;
    case 'openOnboarding': openOnboarding(); break;
    case 'applyUpdate': applyUpdate(); break;
    case 'dismissUpdate': el('update-banner').classList.add('hidden'); break;
    case 'noop': break;
  }
}
function practiceSkill(id){ if(SKILL_BY_ID[id]) startSession([id], SKILL_BY_ID[id].name, 10); }  // a 10-problem set gives a reliable results payoff
function toggleDay(){
  var c=_activeCourse, i=_activeDayIdx; if(!c) return;
  var prog=state.courseProgress[c.id]; var willComplete=!prog[i];
  prog[i]=!prog[i];
  if(willComplete){
    chimeOk(); vibrate(18);
    markActiveToday();                 // finishing a lesson keeps the streak alive

function toggleBookmark(arg){

function checkPotd(){

  var ok=false; try{ ok=_potd.prob.accept(v); }catch(e){ ok=false; }

function toggleSetting(key){ state.settings[key]=!state.settings[key]; saveState(); if(key==='reduceMotion') applyMotion(); openSettings(); if(key==='sound'&&state.settings.sound) chimeOk(); if(key==='confetti'&&state.settings.confetti) confetti(70); }
function setAccent(name){ state.settings.accent=name; document.documentElement.dataset.accent=name; saveState(); openSettings(); }
function exportData(){
  // stamp a schema version so a future import can migrate older files
  var payload={}; for(var k in state) payload[k]=state[k]; payload._schema=1; payload._exportedAt=todayStr();
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='axiom-progress.json'; a.click(); URL.revokeObjectURL(url);
  toast('Progress exported');
}
function importData(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='application/json';
  inp.onchange=function(){ var f=inp.files[0]; if(!f) return; var r=new FileReader();
    r.onload=function(){ try{
        var data=JSON.parse(r.result);
        if(!data || typeof data!=='object' || Array.isArray(data)) throw new Error('shape');
        // Sanitize against DEFAULT_STATE: copy only known keys whose type matches,
        // so a malformed/hostile file can't corrupt state or crash the app. This
        // mirrors loadState() — map-shaped keys (skillStats/courseProgress/
        // achievements default to {}) are assigned whole, never key-by-key, or
        // their contents would be silently dropped.
        var clean=deepClone(DEFAULT_STATE);
        for(var k in DEFAULT_STATE){ if(!Object.prototype.hasOwnProperty.call(data,k)) continue;
          var dv=data[k], def=DEFAULT_STATE[k];
          if(k==='settings'){ if(dv && typeof dv==='object' && !Array.isArray(dv)){ for(var s in def){ if((s in dv) && typeof dv[s]===typeof def[s]) clean.settings[s]=dv[s]; } } }
          else if(Array.isArray(def)){ if(Array.isArray(dv)) clean[k]=dv; }
          else if(def && typeof def==='object'){ if(dv && typeof dv==='object' && !Array.isArray(dv)) clean[k]=dv; }
          else if(typeof dv===typeof def){ clean[k]=dv; }
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(clean)); state=loadState();
        state.updatedAt=now(); saveState();   // an explicit import wins: stamp fresh + push so the cloud can't overwrite it
        migrateAllStats(); applyAccent(); applyMotion(); refreshStreakUI(); updateHeaderProgress(); closeSheet(); showTab('today'); toast('Progress imported');
      }catch(e){ toast('Invalid file'); } };
    r.readAsText(f); };
  inp.click();
}
function resetData(){
  confirmModal('Reset everything?','All progress, streaks, mastery, and bookmarks will be erased. This cannot be undone.',{ok:'Reset all',danger:true}).then(function(ok){
    if(ok){ localStorage.removeItem(STORAGE_KEY); state=loadState(); applyAccent(); refreshStreakUI(); closeSheet(); showTab('today'); toast('Everything reset'); }
  });
}

// ================================================================
// GLOBAL EVENT WIRING
// ================================================================
// keep the answer field focused when a keypad key is tapped (prevents the mobile
// soft-keyboard from flickering/closing on every symbol)
document.addEventListener('pointerdown', function(e){ if(e.target.closest('.kp-key')) e.preventDefault(); }, {passive:false});
document.addEventListener('click', function(e){
  // math keypad symbol insertion
  var kp=e.target.closest('.kp-key');
  if(kp){ insertAtCaret(kp.getAttribute('data-key')); return; }
  // glossary popup
  var g=e.target.closest('.gloss[data-gk]');
  if(g){ e.stopPropagation(); showGlossPop(g); return; }
  if(!e.target.closest('#gloss-pop')) hideGlossPop();
  // data-close
  if(e.target.hasAttribute('data-close') || e.target.classList.contains('backdrop')){ if(e.target.closest('#overlays')||e.target.classList.contains('backdrop')){ closeSheet(); return; } }
  // data-act
  var a=e.target.closest('[data-act]');
  if(a){ var act=a.getAttribute('data-act'), arg=a.getAttribute('data-arg');
    // visual tap pulse
    a.classList.remove('tap-pulse'); void a.offsetWidth; a.classList.add('tap-pulse');
    _pendingTrigger = a;                 // so a dialog restores focus here on close
    handleAct(act, arg, a);
    _pendingTrigger = null;
  }
});
// keyboard activation: gloss terms + any non-button element exposed as a control,
// plus Escape to dismiss the open sheet/drawer/popup.
document.addEventListener('keydown', function(e){
  // accent radiogroup arrow-key selection (WAI-ARIA radio pattern)
  var radio = e.target && e.target.closest && e.target.closest('[data-act="setAccent"][role="radio"]');
  if(radio && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].indexOf(e.key)>=0){
    e.preventDefault();
    var radios=Array.prototype.slice.call(document.querySelectorAll('[data-act="setAccent"][role="radio"]'));
    var i=radios.indexOf(radio); if(i<0) return;
    var fwd=(e.key==='ArrowRight'||e.key==='ArrowDown');
    var ni = e.key==='Home'?0 : e.key==='End'?radios.length-1 : fwd?(i+1)%radios.length : (i-1+radios.length)%radios.length;
    var next=radios[ni]; if(next){ setAccent(next.getAttribute('data-arg')); var nr=document.querySelector('[data-act="setAccent"][data-arg="'+next.getAttribute('data-arg')+'"]'); if(nr) nr.focus(); }
    return;
  }
  // tablist arrow-key navigation (WAI-ARIA APG roving-tabindex model)
  var tab = e.target && e.target.closest && e.target.closest('.nav-btn[role="tab"]');
  if(tab && ['ArrowLeft','ArrowRight','Home','End'].indexOf(e.key)>=0){
    e.preventDefault();
    var btns=Array.prototype.slice.call(document.querySelectorAll('.nav-btn[role="tab"]'));
    var i=btns.indexOf(tab); if(i<0) return;
    var ni = e.key==='Home'?0 : e.key==='End'?btns.length-1 : e.key==='ArrowLeft'?(i-1+btns.length)%btns.length : (i+1)%btns.length;
    var next=btns[ni]; if(next){ showTab(next.getAttribute('data-arg')); next.focus(); }
    return;
  }
  // trap Tab within an open modal dialog so focus can't escape behind it
  if(e.key==='Tab'){
    var dlg=topmostDialog();
    if(dlg){
      var nodes=dlg.querySelectorAll('button,a[href],input:not([type=hidden]),textarea,select,[tabindex]:not([tabindex="-1"])');
      var f=Array.prototype.filter.call(nodes,function(x){ return !x.disabled && x.offsetParent!==null; });
      if(f.length){ var first=f[0], last=f[f.length-1];
        if(!dlg.contains(document.activeElement)){ e.preventDefault(); first.focus(); }
        else if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
        else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
      }
    }
  }
  if(e.key==='Escape'){ var gp=el('gloss-pop'); if(gp && gp.style.display!=='none'){ hideGlossPop(); return; } if(_sheetWrap){ closeSheet(); return; } hideGlossPop(); return; }
  if(e.key==='Enter' || e.key===' ' || e.key==='Spacebar'){
    var t=e.target;
    if(t && t.classList && t.classList.contains('gloss') && t.getAttribute && t.getAttribute('data-gk')){ e.preventDefault(); showGlossPop(t); return; }
    if(t && t.hasAttribute && t.hasAttribute('data-act') && t.tagName!=='BUTTON' && t.tagName!=='A' && t.getAttribute('role')==='button'){
      e.preventDefault(); handleAct(t.getAttribute('data-act'), t.getAttribute('data-arg'), t);
    }
  }
});
window.addEventListener('resize', hideGlossPop);
window.addEventListener('scroll', hideGlossPop, true);

// ================================================================
// ACCENT + INIT
// ================================================================
function applyAccent(){ document.documentElement.dataset.accent = (state.settings&&state.settings.accent)||'violet'; }

RENDERERS = { today:renderToday, learn:renderLearn, practice:renderPractice, library:renderLibrary, progress:renderProgress };

// One-time upgrade for pre-sync installs: they have updatedAt=0, which always
// "loses" last-write-wins and would let a fresh/emptier cloud row clobber real
// local progress on the first pull. If there IS local progress, give it a
// timestamp derived from last activity (so a more-recently-used device outranks
// a stale one). Untouched/default installs stay at 0 so a new device correctly
// pulls. Writes localStorage directly to avoid saveState() re-stamping to now().
function stampLegacyProgress(){
  if(state.updatedAt) return;
  var hasProgress = (state.solvedTotal>0) || state.hasOnboarded
    || (state.skillStats && Object.keys(state.skillStats).length>0)
    || (state.activeDays && state.activeDays.length>0);
  if(!hasProgress) return;
  var d=null;
  if(state.streak && state.streak.lastActiveDate) d=state.streak.lastActiveDate;
  if(state.activeDays && state.activeDays.length){ var la=state.activeDays[state.activeDays.length-1]; if(!d || la>d) d=la; }
  if(state.history && state.history.length){ var h=state.history[state.history.length-1]; if(h && h.date && (!d || h.date>d)) d=h.date; }
  var ts=now();
  if(d){ var p=String(d).split('-').map(Number); var t=Date.UTC(p[0],(p[1]||1)-1,p[2]||1); if(t>0) ts=t+12*3600000; }
  state.updatedAt=ts;
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function migrateAllStats(){
  // ensure every stored skill stat has the v2 adaptive fields (statFor migrates lazily,
  // but the render/diagnostics layer reads stats directly)
  for(var id in state.skillStats){ if(SKILL_BY_ID[id]) statFor(id); }
}
function init(){
  state=loadState();
  migrateAllStats();
  state._libQuery='';   // don't restore a stale search on launch
  applyAccent();
  applyMotion();
  buildGlossIndex();
  refreshStreakUI();
  stampLegacyProgress();   // stamp pre-sync progress BEFORE checkStreakBroken — a freeze-spend would otherwise saveState() and re-stamp updatedAt=now()
  grantFreezeIfDue();      // regenerate any due freeze BEFORE the break-check reads the balance (else a recoverable streak is lost)
  checkStreakBroken();
  updateHeaderProgress();
  // splash only in standalone
  var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
  if(standalone){ var sp=el('splash'); sp.classList.remove('hidden'); setTimeout(function(){ sp.classList.add('hide'); setTimeout(function(){sp.remove();},600); }, 1900); }
  // honor PWA shortcut deep-links (?tab=practice&review=1)
  var params={}; try{ (location.search||'').replace(/^\?/,'').split('&').forEach(function(kv){ var p=kv.split('='); if(p[0]) params[decodeURIComponent(p[0])]=decodeURIComponent(p[1]||''); }); }catch(e){}
  var startTab = (params.tab && TABS.indexOf(params.tab)>=0) ? params.tab : (state.tab||'today');
  showTab(startTab);
  if(params.review){ setTimeout(startReview, 300); }
  // retro-unlock any achievements already earned by existing progress (silent for fresh users)
  checkAchievements();
  SYNC.init();   // restore any cloud session + pull (no-op unless configured & signed in)
  if(!state.hasOnboarded && state.solvedTotal===0){ setTimeout(openOnboarding, standalone?2200:400); }
}

function safeInit(){ try{ init(); }catch(e){ /* keep the app loadable even if first paint hiccups */ console&&console.error&&console.error('init',e); } }
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', safeInit); else safeInit();
whenKatex(function(){ try{ RENDERERS[state.tab] && RENDERERS[state.tab](); }catch(e){} });

window.__AXIOM = { state:function(){return state;}, SKILLS:SKILLS, evalExpr:evalExpr, GEN:GEN, levelInfo:function(){return levelInfo();}, awardXp:awardXp, checkAchievements:checkAchievements, ACHIEVEMENTS:ACHIEVEMENTS, mergeStates:mergeStates, trackSkillIds:trackSkillIds, buildItemFromSkill:buildItemFromSkill, SKILL_BY_ID:SKILL_BY_ID };

// ================================================================
// SERVICE WORKER + UPDATE FLOW
// ================================================================
var _waitingSW=null;
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      function track(w){ if(!w) return; w.addEventListener('statechange',function(){ if(w.state==='installed' && navigator.serviceWorker.controller){ _waitingSW=w; showUpdateBanner(); } }); }
      if(reg.waiting && navigator.serviceWorker.controller){ _waitingSW=reg.waiting; showUpdateBanner(); }
      reg.addEventListener('updatefound', function(){ track(reg.installing); });
      // periodic + visibility update checks
      setInterval(function(){ reg.update(); }, 30*60*1000);
      document.addEventListener('visibilitychange', function(){ if(!document.hidden) reg.update(); });
    }).catch(function(){});
    var reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){ if(reloaded) return; reloaded=true; window.location.reload(); });
  });
}
function showUpdateBanner(){ el('update-banner').classList.remove('hidden'); }
function applyUpdate(){ if(_waitingSW){ el('update-text').innerHTML='<span class="spinner"></span> Updating…'; _waitingSW.postMessage({type:'SKIP_WAITING'}); } }

})();
